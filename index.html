/* ─────────────────────────────────────────────────────────────────────────
   lineService
───────────────────────────────────────────────────────────────────────── */
const lineService = {
  async loadAll() {
    const lines = await DB.getAll('lines');
    AppState.setLines(lines);
    return lines;
  },

  async loadLineData(lineId) {
    const [employees, positions, skillRecords] = await Promise.all([
      DB.getAllByIndex('employees', 'lineId', lineId),
      DB.getAllByIndex('positions', 'lineId', lineId),
      DB.getAllByIndex('skillRecords', 'lineId', lineId),
    ]);
    AppState.setLineData({ employees, positions, skillRecords, lineId });
    return { employees, positions, skillRecords };
  },

  async loadUsers() {
    const users = await DB.getAll('users');
    AppState.setUsers(users);
    return users;
  },

  async addLine(name, shift) {
    const id = await DB.add('lines', { name, shift: shift || null, createdAt: Date.now() });
    await this.loadAll();
    return id;
  },

  async addEmployee(lineId, name, role) {
    const norm = name.trim().toLowerCase();
    const data = { lineId, name: name.trim(), normalizedName: norm, role, active: true, createdAt: Date.now() };
    let id;
    try {
      id = await DB.add('employees', data);
    } catch (e) {
      // Unique constraint: upsert
      id = await DB.upsertByIndex('employees', 'lineNormName', [lineId, norm], data);
    }
    return id;
  },

  async addPosition(lineId, name, critical, sortOrder) {
    const norm = name.trim().toLowerCase();
    const data = { lineId, name: name.trim(), normalizedName: norm, critical: !!critical, sortOrder: sortOrder || 0, createdAt: Date.now() };
    let id;
    try {
      id = await DB.add('positions', data);
    } catch (e) {
      id = await DB.upsertByIndex('positions', 'lineNormName', [lineId, norm], data);
    }
    return id;
  },

  async deactivateEmployee(empId) {
    const rec = await DB.get('employees', empId);
    if (rec) await DB.put('employees', { ...rec, active: false });
  },

  async deactivatePosition(posId) {
    const rec = await DB.get('positions', posId);
    if (rec) await DB.put('positions', { ...rec, active: false });
  },

  async addUser(name, role, lineIds) {
    const norm = name.trim().toLowerCase();
    return await DB.add('users', { name: name.trim(), normalizedName: norm, role, active: true, lineIds: lineIds || [], createdAt: Date.now() });
  },

  async deactivateUser(userId) {
    const rec = await DB.get('users', userId);
    if (rec) await DB.put('users', { ...rec, active: false });
  }
};

/* ─────────────────────────────────────────────────────────────────────────
   skillService
───────────────────────────────────────────────────────────────────────── */
const skillService = {
  async getOrBlank(empId, posId) {
    let rec = AppState.getSkillRecord(empId, posId);
    if (!rec) {
      rec = await DB.getByIndex('skillRecords', 'empPos', IDBKeyRange.only([empId, posId]));
    }
    if (!rec) rec = skillSM.blank(empId, posId);
    return rec;
  },

  async promote(record, approverName, approverRole, comment) {
    const result = skillSM.addPromotion(record, approverName, approverRole, comment);
    if (!result.ok) return result;

    const lineId = record.lineId || AppState.currentLineId;
    const newRec = { ...result.newRecord, lineId };

    if (newRec.id) {
      await DB.put('skillRecords', newRec);
    } else {
      const id = await DB.add('skillRecords', newRec);
      newRec.id = id;
    }

    AppState.updateSkillRecord(newRec);
    return { ...result, newRecord: newRec };
  },

  async demote(record, supervisorName, targetLevel, reason) {
    const result = skillSM.demote(record, supervisorName, targetLevel, reason);
    if (!result.ok) return result;

    const newRec = { ...result.newRecord };
    if (newRec.id) {
      await DB.put('skillRecords', newRec);
    } else {
      const id = await DB.add('skillRecords', newRec);
      newRec.id = id;
    }
    AppState.updateSkillRecord(newRec);
    return { ...result, newRecord: newRec };
  },

  async getPendingDual(lineId) {
    const records = await DB.getAllByIndex('skillRecords', 'lineId', lineId);
    return records.filter(r => r.status === 'pending_dual');
  },

  async getPendingRecs(lineId) {
    return await DB.getAllByIndex('pendingRecommendations', 'lineStatus', IDBKeyRange.only([lineId, 'open']));
  },

  async actionRecommendation(recId, result, actionedByName, note) {
    const rec = await DB.get('pendingRecommendations', recId);
    if (!rec) return;
    await DB.put('pendingRecommendations', {
      ...rec, status: 'actioned',
      actionedAt: Date.now(), actionedByName, actionedResult: result, actionNote: note || null
    });
  }
};

/* ─────────────────────────────────────────────────────────────────────────
   attendanceService
───────────────────────────────────────────────────────────────────────── */
const attendanceService = {
  async loadForDate(lineId, date) {
    const records = await DB.getAllByIndex('attendance', 'lineDate', IDBKeyRange.only([lineId, date]));
    const map = new Map();
    records.forEach(r => map.set(r.employeeId, r));
    AppState.setAttendance(map);
    return map;
  },

  async saveAll(lineId, date, shift, formData) {
    // formData: [{ employeeId, status, partialHours, notes }]
    const records = formData.map(d => ({
      lineId, employeeId: d.employeeId, date, shift: shift || _deriveShift(),
      status: d.status || 'present',
      partialHours: d.status === 'partial' ? (parseFloat(d.partialHours) || null) : null,
      notes: d.notes || null
    }));
    await DB.batchUpsertAttendance(records);
    await this.loadForDate(lineId, date);
    return records;
  }
};

function _deriveShift() {
  const h = new Date().getHours();
  if (h >= 6 && h < 14) return 'day';
  if (h >= 14 && h < 22) return 'afternoon';
  return 'night';
}

/* ─────────────────────────────────────────────────────────────────────────
   rotationService
───────────────────────────────────────────────────────────────────────── */
const rotationService = {
  async generate(lineId, date, bbMode) {
    // Load all required data
    const [employees, allAttendance, positions, skillRecords, allPlans] = await Promise.all([
      DB.getAllByIndex('employees', 'lineId', lineId),
      DB.getAllByIndex('attendance', 'lineDate', IDBKeyRange.only([lineId, date])),
      DB.getAllByIndex('positions', 'lineId', lineId),
      DB.getAllByIndex('skillRecords', 'lineId', lineId),
      DB.getAllByIndex('rotationPlans', 'lineId', lineId)
    ]);

    // Yesterday's plan
    const yesterday = allPlans
      .filter(p => p.date !== date)
      .sort((a, b) => b.date.localeCompare(a.date))[0] || null;

    const attMap = new Map();
    allAttendance.forEach(a => attMap.set(a.employeeId, a));

    const activeEmps = employees.filter(e => e.active !== false);
    const presentEmployees = activeEmps.filter(emp => {
      const att = attMap.get(emp.id);
      if (!att) return true;
      return att.status === 'present' || att.status === 'partial';
    });

    // Build qualified sets
    const qualifiedSet = new Set();
    const l2Set = new Set();
    skillRecords.forEach(r => {
      const key = `${r.employeeId}_${r.positionId}`;
      if (r.status === 'approved' && r.currentLevel >= 3) qualifiedSet.add(key);
      if (r.currentLevel === 2) l2Set.add(key);
    });

    // Sort positions
    const sortedPositions = [...positions].sort((a, b) => {
      if (a.critical !== b.critical) return b.critical ? 1 : -1;
      const aCount = skillRecords.filter(r => r.positionId === a.id && r.status === 'approved' && r.currentLevel >= 3).length;
      const bCount = skillRecords.filter(r => r.positionId === b.id && r.status === 'approved' && r.currentLevel >= 3).length;
      return aCount - bCount;
    });

    // Filter for BB mode
    const planPositions = bbMode ? sortedPositions.filter(p => p.critical) : sortedPositions;
    const skippedPositions = bbMode ? sortedPositions.filter(p => !p.critical) : [];

    const result = rotation.generate({
      presentEmployees, positions: planPositions, qualifiedSet, l2Set,
      yesterdayPlan: yesterday, bbMode
    });

    // Add BB skipped gaps
    if (bbMode) {
      ['A','B','C'].forEach(period => {
        skippedPositions.forEach(pos => {
          result.gaps.push({ period, positionId: pos.id, positionName: pos.name, reason: 'bb_skipped' });
        });
      });
    }

    const plan = {
      lineId, date, shift: _deriveShift(), bbMode: !!bbMode,
      slots: result.slots, violations: result.violations,
      gaps: result.gaps, suggestions: result.suggestions, createdAt: Date.now()
    };

    // Upsert by lineDate
    const existing = allPlans.find(p => p.date === date);
    if (existing) {
      plan.id = existing.id;
      await DB.put('rotationPlans', plan);
    } else {
      plan.id = await DB.add('rotationPlans', plan);
    }

    // Prune old plans
    const allNew = await DB.getAllByIndex('rotationPlans', 'lineId', lineId);
    const maxPlans = 30;
    if (allNew.length > maxPlans) {
      const sorted = allNew.sort((a, b) => a.date.localeCompare(b.date));
      const toDelete = sorted.slice(0, allNew.length - maxPlans);
      for (const p of toDelete) await DB.remove('rotationPlans', p.id);
    }

    AppState.setCurrentRotation(plan);
    return plan;
  }
};

      IDBKeyRange.only([log.employeeId, log.positionId]));
    const openRec = existing.find(r => r.status === 'open');

    const deviceId = await DB.getSetting('deviceId', 'unknown');
    const seq = (await DB.getSetting('recLocalSequence', 0)) + 1;
    await DB.setSetting('recLocalSequence', seq);

    // Get current skill level
    const skillRec = AppState.getSkillRecord(log.employeeId, log.positionId);
    const currentLevel = skillRec ? skillRec.currentLevel : null;

    const rec = {
      trainingLogId: log.id,
      employeeId: log.employeeId,
      employeeNameSnapshot: log.employeeNameSnapshot,
      positionId: log.positionId,
      positionNameSnapshot: log.positionNameSnapshot,
      lineId: log.lineId,

    };

      await DB.add('pendingRecommendations', rec);
    } catch (e) {

    }

/* ─────────────────────────────────────────────────────────────────────────
   syncService
───────────────────────────────────────────────────────────────────────── */
const syncService = {
  async exportDelta(lineId) {
    const [logs, recs] = await Promise.all([
      DB.getAllByIndex('trainingLogs', 'syncedToAuthority', false),
      DB.getAllByIndex('pendingRecommendations', 'syncedToAuthority', false)
    ]);
    const filteredLogs = logs.filter(l => l.lineId === lineId);
    const filteredRecs = recs.filter(r => r.lineId === lineId);

    if (!filteredLogs.length && !filteredRecs.length) return null;

    const records = { trainingLogs: filteredLogs, pendingRecommendations: filteredRecs };
    const deviceId = await DB.getSetting('deviceId', 'unknown');
    const seedVersion = await DB.getSetting('seedVersion', 1);
    const usersVersion = await DB.getSetting('usersVersion', 1);
    const checksum = await _sha256(JSON.stringify(records));

    const bundle = {
      schemaVersion: 2,
      bundleId: _uuid(),
      exportedAt: Date.now(),
      sourceDeviceId: deviceId,
      targetLineId: lineId,
      seedVersion,
      usersVersion,
      recordCount: { trainingLogs: filteredLogs.length, pendingRecommendations: filteredRecs.length },
      records,
      checksum
    };

    return bundle;
  },

  async importDelta(bundle) {
    const results = { imported: 0, skipped: 0, errors: 0, unresolved: 0, details: [] };

    // Validate checksum
    const computedChecksum = await _sha256(JSON.stringify(bundle.records));
    if (computedChecksum !== bundle.checksum) {
      throw new Error('Bundle checksum mismatch — file may be corrupted');
    }

    const line = AppState.lines.find(l => l.id === bundle.targetLineId);
    if (!line) throw new Error(`Unknown targetLineId: ${bundle.targetLineId}`);

    const now = Date.now();

    // Import training logs
    for (const log of (bundle.records.trainingLogs || [])) {
      try {
        // Resolve references
        const empRecord = await DB.get('employees', log.employeeId);
        const posRecord = await DB.get('positions', log.positionId);
        const resolved = {
          ...log,
          employeeResolved: !!(empRecord && empRecord.lineId === bundle.targetLineId),
          positionResolved: !!(posRecord && posRecord.lineId === bundle.targetLineId),
          serverReceivedAt: now,
          importedAt: now
        };
        if (!resolved.employeeResolved) { resolved.employeeId = null; results.unresolved++; }
        if (!resolved.positionResolved) { resolved.positionId = null; }

        await DB.add('trainingLogs', resolved);
        results.imported++;
        results.details.push({ clientId: log.clientId, status: 'imported' });
      } catch (e) {
        if (e.name === 'ConstraintError') {
          results.skipped++;
          results.details.push({ clientId: log.clientId, status: 'skipped' });
        } else {
          results.errors++;
          results.details.push({ clientId: log.clientId, status: 'error', detail: e.message });
        }
      }
    }

    // Import pending recommendations
    for (const rec of (bundle.records.pendingRecommendations || [])) {
      try {
        await DB.add('pendingRecommendations', rec);

        // Dedup: check for existing open rec with same empPos
        const existing = await DB.getAllByIndex('pendingRecommendations', 'empPos',
          IDBKeyRange.only([rec.employeeId, rec.positionId]));
        const openOnes = existing.filter(r => r.status === 'open');
        if (openOnes.length > 1) {
          // Keep oldest, remove duplicates
          const sorted = openOnes.sort((a, b) => a.createdAt - b.createdAt);
          for (let i = 1; i < sorted.length; i++) await DB.remove('pendingRecommendations', sorted[i].id);
        }

        results.imported++;
      } catch (e) {
        if (e.name === 'ConstraintError') results.skipped++;
        else results.errors++;
      }
    }

    return results;
  },

  async markSynced(clientIds) {
    for (const cid of clientIds) {
      const log = await DB.getByIndex('trainingLogs', 'clientId', cid);
      if (log) await DB.put('trainingLogs', { ...log, syncedToAuthority: true });
      const rec = await DB.getByIndex('pendingRecommendations', 'clientId', cid);
      if (rec) await DB.put('pendingRecommendations', { ...rec, syncedToAuthority: true });
    }
  },

  async generateSeed(lineId) {
    const line = AppState.lines.find(l => l.id === lineId);
    if (!line) throw new Error('Line not found');

    const [employees, positions, users] = await Promise.all([
      DB.getAllByIndex('employees', 'lineId', lineId),
      DB.getAllByIndex('positions', 'lineId', lineId),
      DB.getAll('users')
    ]);

    const deviceId = await DB.getSetting('deviceId', 'unknown');
    const seedVersion = Date.now(); // use timestamp as version
    const usersVersion = Date.now();

    return {
      schemaVersion: 2,
      seedId: _uuid(),
      authorityDeviceId: deviceId,
      lineId, lineName: line.name, lineShift: line.shift,
      seedVersion, usersVersion,
      generatedAt: Date.now(),
      language: window._LANG || 'en',
      shiftBoundaries: { day: '06:00', afternoon: '14:00', night: '22:00' },
      employees: employees.filter(e => e.active !== false),
      positions,
      users: users.filter(u => u.active !== false)
    };
  },

  async importSeed(seed) {
    if (seed.schemaVersion !== 2) throw new Error('Invalid seed schema version');
    if (!seed.lineId || !seed.employees) throw new Error('Invalid seed file');

    // Write all in sequence (IDB multi-store transactions not easily wrapped)
    for (const emp of seed.employees) {
      try {
        await DB.add('employees', emp);
      } catch (e) {
        await DB.upsertByIndex('employees', 'lineNormName', [emp.lineId, emp.normalizedName], emp);
      }
    }

    for (const pos of seed.positions) {
      try {
        await DB.add('positions', pos);
      } catch (e) {
        await DB.upsertByIndex('positions', 'lineNormName', [pos.lineId, pos.normalizedName], pos);
      }
    }

    for (const user of seed.users) {
      try {
        await DB.add('users', user);
      } catch (e) {
        // ignore
      }
    }

    const deviceId = _uuid();
    await DB.put('devices', {
      id: deviceId, label: `Field Device - ${seed.lineName}`,
      role: 'field', lineId: seed.lineId,
      provisionedAt: Date.now(), lastSyncAt: null,
      seedVersion: seed.seedVersion, usersVersion: seed.usersVersion
    });

    await DB.setSetting('deviceId', deviceId);
    await DB.setSetting('deviceRole', 'field');
    await DB.setSetting('deviceLabel', `Field - ${seed.lineName}`);
    await DB.setSetting('deviceLineId', seed.lineId);
    await DB.setSetting('seedVersion', seed.seedVersion);
    await DB.setSetting('usersVersion', seed.usersVersion);
    await DB.setSetting('language', seed.language || 'en');
    await DB.setSetting('logLocalSequence', 0);
    await DB.setSetting('recLocalSequence', 0);

    window._LANG = seed.language || 'en';
  }
};

/* ─────────────────────────────────────────────────────────────────────────
   importExportService — Excel import/export
───────────────────────────────────────────────────────────────────────── */
const importExportService = {
  async importExcel(file, lineId) {
    if (!window.XLSX) throw new Error(t('no_xlsx'));

    const buf = await _readFile(file);
    const wb = XLSX.read(buf, { type: 'array' });
    const detection = templateMapper.detectMapping(wb);

    if (!detection.valid) {
      return { needsReview: true, detection, workbook: wb, binary: new Uint8Array(buf) };
    }

    return await this._processImport(wb, detection, lineId, new Uint8Array(buf), file.name);
  },

  async _processImport(wb, mapping, lineId, binary, fileName) {
    const ws = wb.Sheets[mapping.sheet];
    const extracted = templateMapper.extractData(ws, mapping);
    const stats = { newEmployees: 0, newPositions: 0, skillRecords: 0 };
    const now = Date.now();

    // Upsert positions
    const posMap = {};
    for (let i = 0; i < extracted.positions.length; i++) {
      const pn = extracted.positions[i].name;
      const norm = pn.trim().toLowerCase();
      let existing = await DB.getByIndex('positions', 'lineNormName', IDBKeyRange.only([lineId, norm]));
      if (!existing) {
        const id = await lineService.addPosition(lineId, pn, false, i);
        posMap[pn] = id;
        stats.newPositions++;
      } else {
        posMap[pn] = existing.id;
      }
    }

    // Upsert employees
    const empMap = {};
    for (const en of extracted.employees) {
      const norm = en.name.trim().toLowerCase();
      let existing = await DB.getByIndex('employees', 'lineNormName', IDBKeyRange.only([lineId, norm]));
      if (!existing) {
        const id = await lineService.addEmployee(lineId, en.name, 'operator');
        empMap[en.name] = id;
        stats.newEmployees++;
      } else {
        empMap[en.name] = existing.id;
      }
    }

    // Upsert skill records
    for (const sk of extracted.skills) {
      if (!sk.level || sk.level === 0) continue;
      const empId = empMap[sk.empName];
      const posId = posMap[sk.posName];
      if (!empId || !posId) continue;

      const rec = skillSM.fromImport(empId, posId, sk.level, lineId);
      try {
        rec.id = await DB.add('skillRecords', rec);
        stats.skillRecords++;
      } catch (e) {
        // Update existing
        const existing = await DB.getByIndex('skillRecords', 'empPos', IDBKeyRange.only([empId, posId]));
        if (existing) {
          const updated = { ...existing, currentLevel: sk.level };
          if (!updated.history) updated.history = [];
          updated.history.push({ type: 'import', fromLevel: existing.currentLevel, toLevel: sk.level, by: 'Excel Import', role: 'system', at: now });
          await DB.put('skillRecords', updated);
          stats.skillRecords++;
        }
      }
    }

    // Save template mapping
    const mappingRecord = {
      lineId, fileName: fileName || '',
      sheetName: mapping.sheet, headerRow: mapping.headerRow,
      rosterCol: mapping.rosterCol, firstPositionCol: mapping.firstPositionCol,
      firstRosterRow: mapping.firstRosterRow, detectionMethod: mapping.method,
      templateBinary: binary, savedAt: Date.now()
    };
    await DB.upsertByIndex('templateMappings', 'lineId', lineId, mappingRecord);

    return { needsReview: false, stats, mapping };
  },

  async saveMapping(wb, mapping, lineId, binary, fileName) {
    return await this._processImport(wb, mapping, lineId, binary, fileName);
  },

  async exportExcel(lineId) {
    if (!window.XLSX) throw new Error(t('no_xlsx'));
    const tmRecord = await DB.getByIndex('templateMappings', 'lineId', lineId);
    if (!tmRecord) throw new Error(t('no_template'));

    const [employees, positions, skillRecords] = await Promise.all([
      DB.getAllByIndex('employees', 'lineId', lineId),
      DB.getAllByIndex('positions', 'lineId', lineId),
      DB.getAllByIndex('skillRecords', 'lineId', lineId),
    ]);

    const activeEmps = employees.filter(e => e.active !== false)
      .sort((a, b) => (a.createdAt || 0) - (b.createdAt || 0));
    const sortedPos = positions.sort((a, b) => (a.sortOrder || 0) - (b.sortOrder || 0));

    const wb = XLSX.read(tmRecord.templateBinary, { type: 'array' });
    const ws = wb.Sheets[tmRecord.sheetName];
    const m = tmRecord;

    const skillMap = {};
    skillRecords.forEach(r => { skillMap[`${r.employeeId}_${r.positionId}`] = r; });

    // Write positions to header row
    sortedPos.forEach((pos, i) => {
      const addr = XLSX.utils.encode_cell({ r: m.headerRow, c: m.firstPositionCol + i });
      if (ws[addr]) { ws[addr].v = pos.name; ws[addr].w = pos.name; }
      else ws[addr] = { t: 's', v: pos.name };
    });

    // Write employees + skill grid
    activeEmps.forEach((emp, ei) => {
      const rosterAddr = XLSX.utils.encode_cell({ r: m.firstRosterRow + ei, c: m.rosterCol });
      if (ws[rosterAddr]) { ws[rosterAddr].v = emp.name; ws[rosterAddr].w = emp.name; }
      else ws[rosterAddr] = { t: 's', v: emp.name };

      sortedPos.forEach((pos, pi) => {
        const cellAddr = XLSX.utils.encode_cell({ r: m.firstRosterRow + ei, c: m.firstPositionCol + pi });
        const sr = skillMap[`${emp.id}_${pos.id}`];
        const level = sr ? sr.currentLevel : 0;
        if (ws[cellAddr]) { ws[cellAddr].v = level; ws[cellAddr].w = String(level); ws[cellAddr].t = 'n'; }
        else ws[cellAddr] = { t: 'n', v: level };
      });
    });

    // Update range
    const lastR = m.firstRosterRow + activeEmps.length - 1;
    const lastC = m.firstPositionCol + sortedPos.length - 1;
    ws['!ref'] = XLSX.utils.encode_range({ s: { r: 0, c: 0 }, e: { r: lastR, c: lastC } });

    const date = new Date().toISOString().slice(0, 10);
    const line = AppState.lines.find(l => l.id === lineId);
    XLSX.writeFile(wb, `SkillMatrix_${line ? line.name.replace(/\s/g, '_') : lineId}_${date}.xlsx`);
  }
};

/* ─────────────────────────────────────────────────────────────────────────
   Helpers
───────────────────────────────────────────────────────────────────────── */
function _readFile(file) {
  return new Promise((res, rej) => {
    const reader = new FileReader();
    reader.onload = e => res(e.target.result);
    reader.onerror = e => rej(e);
    reader.readAsArrayBuffer(file);
  });
}

async function _sha256(str) {
  try {
    const buf = new TextEncoder().encode(str);
    const hash = await crypto.subtle.digest('SHA-256', buf);
    return Array.from(new Uint8Array(hash)).map(b => b.toString(16).padStart(2, '0')).join('');
  } catch (e) {
    // Fallback for non-secure context
    let h = 0;
    for (let i = 0; i < str.length; i++) { h = ((h << 5) - h) + str.charCodeAt(i); h |= 0; }
    return Math.abs(h).toString(16);
  }
}

function _uuid() {
  if (crypto.randomUUID) return crypto.randomUUID();
  return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, c => {
    const r = Math.random() * 16 | 0;
    return (c === 'x' ? r : (r & 0x3 | 0x8)).toString(16);
  });
}

function _downloadJSON(obj, filename) {
  const blob = new Blob([JSON.stringify(obj, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  a.click();
  URL.revokeObjectURL(url);
}

function _shiftBadge(shift) {

}
function _colLetter(idx) {
  if (window.XLSX) return XLSX.utils.encode_col(idx);
  let r = '', n = idx + 1;
  while (n > 0) { n--; r = String.fromCharCode(65 + n % 26) + r; n = Math.floor(n / 26); }
  return r;
}
function _colIndex(letter) {
  if (window.XLSX) return XLSX.utils.decode_col(letter.toUpperCase().trim());
  let r = 0;
  for (const c of letter.toUpperCase().trim()) r = r * 26 + (c.charCodeAt(0) - 64);
  return r - 1;
}
function _setupUploadZone(zoneId, inputId, handler) {
  const zone = document.getElementById(zoneId);
  const input = document.getElementById(inputId);
  if (!zone || !input) return;
  zone.onclick = () => input.click();
  input.onchange = e => { if (e.target.files[0]) handler(e.target.files[0]); };
  zone.ondragover = e => { e.preventDefault(); zone.classList.add('drag-over'); };
  zone.ondragleave = () => zone.classList.remove('drag-over');
  zone.ondrop = e => {
    e.preventDefault(); zone.classList.remove('drag-over');
    if (e.dataTransfer.files[0]) handler(e.dataTransfer.files[0]);
  };
}
function _setupTabs(root) {
  (root || document).querySelectorAll('.tab-btn').forEach(btn => {
    btn.onclick = () => {
      const parent = btn.closest('.tabs').parentElement;
      parent.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      parent.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
      btn.classList.add('active');
      parent.querySelector('#tab-' + btn.dataset.tab)?.classList.add('active');
    };
  });
}

Pages.matrix = function() {
  const lineId = AppState.currentLineId;
  if (!lineId) { _rc(_noLine()); return; }
  const employees = AppState.employees;
  const positions = AppState.positions;

  _rc(`
    <div class="matrix-filter-bar">
      <input type="text" id="emp-search" placeholder="${t('col_employee')}…" style="max-width:200px">
      <select id="pos-filter">
        <option value="all">All Positions</option>
        <option value="critical">Critical Only</option>
      </select>
      <span class="matrix-scale-info">${employees.length} ${t('team_members')} × ${positions.length} ${t('positions_label')}</span>
    </div>
    <div class="matrix-container" id="matrix-wrap"></div>
    <div class="matrix-legend" style="margin-top:var(--sp-4)">
      ${[0,1,2,3,4].map(l => `<div class="legend-item"><div class="level-cell lc-${l}" style="cursor:default">${t('level_short_'+l)}</div>${t('level_'+l)}</div>`).join('')}
      <div class="legend-item"><div class="level-cell lc-3 pending" style="cursor:default">L3</div>${t('pending_dual')}</div>
    </div>`);

  _buildMatrixTable(employees, positions);

  document.getElementById('emp-search').addEventListener('input', e => {
    const q = e.target.value.toLowerCase();
    document.querySelectorAll('tr.emp-row').forEach(row => {
      row.style.display = row.dataset.name.toLowerCase().includes(q) ? '' : 'none';
    });
  });

  document.getElementById('pos-filter').addEventListener('change', e => {
    const crit = e.target.value === 'critical';
    document.querySelectorAll('th.th-pos').forEach(th => {
      th.style.display = (!crit || th.dataset.critical === 'true') ? '' : 'none';
    });
    document.querySelectorAll('td.td-skill').forEach(td => {
      const pos = AppState.positions.find(p => p.id === +td.dataset.pos);
      td.style.display = (!crit || (pos && pos.critical)) ? '' : 'none';
    });
  });
};

function _buildMatrixTable(employees, positions) {
  const wrap = document.getElementById('matrix-wrap');
  if (!wrap) return;
  const sm = AppState.skillMap;

  const headers = positions.map(p =>
    `<th class="th-pos" data-pos="${p.id}" data-critical="${p.critical}">
      <div class="pos-header-wrap"><span class="pos-header-text${p.critical ? ' critical' : ''}" title="${p.name}">${p.name}</span></div>
    </th>`).join('');

  const rows = employees.map(emp => {
    const cells = positions.map(pos => {
      const rec = sm.get(`${emp.id}_${pos.id}`);
      const lv = rec ? rec.currentLevel : 0;
      const pending = rec && rec.status === 'pending_dual';
      return `<td class="td-skill" data-emp="${emp.id}" data-pos="${pos.id}">
        <div class="level-cell lc-${lv}${pending ? ' pending' : ''}">${t('level_short_'+lv)}</div>
      </td>`;
    }).join('');
    return `<tr class="emp-row" data-name="${emp.name}" data-emp="${emp.id}">
      <td class="td-roster">
        <span class="emp-name">${emp.name}</span>
        <span class="emp-role-badge">${emp.role === 'teamlead' ? 'TL' : emp.role === 'supervisor' ? 'SUP' : ''}</span>
      </td>${cells}</tr>`;
  }).join('');

  wrap.innerHTML = `<table class="matrix-table">
    <thead><tr><th class="th-corner">${t('col_employee')}</th>${headers}</tr></thead>
    <tbody>${rows || `<tr><td colspan="${positions.length+1}" class="empty-state">No employees</td></tr>`}</tbody>
  </table>`;

  wrap.addEventListener('click', e => {
    const td = e.target.closest('td.td-skill');
    if (td) _openSkillModal(+td.dataset.emp, +td.dataset.pos);
  });
}

async function _openSkillModal(empId, posId) {
  const emp = AppState.employees.find(e => e.id === empId);
  const pos = AppState.positions.find(p => p.id === posId);
  if (!emp || !pos) return;

  let rec = await skillService.getOrBlank(empId, posId);
  rec = { ...rec, lineId: AppState.currentLineId };

  const isSup = Session.isSupervisor();
  const isPending = rec.status === 'pending_dual';
  const canPromote = rec.currentLevel < 4;
  const targetLv = rec.currentLevel + 1;

  const approvalHtml = (rec.approvals || []).map(a =>
    `<div class="history-entry"><div class="history-dot promotion"></div>
      <div><div class="history-text">${a.approverName} <span class="badge badge-info">${a.role}</span> → ${t('level_'+a.forLevel)}</div>
      <div class="history-meta">${_fmtTs(a.timestamp)}${a.comment ? ' — '+a.comment : ''}</div></div></div>`).join('');

  const histHtml = (rec.history || []).slice().reverse().map(h =>
    `<div class="history-entry"><div class="history-dot ${h.type}"></div>
      <div><div class="history-text">${t('level_'+h.fromLevel)} → ${t('level_'+h.toLevel)} <span class="badge badge-info">${h.type}</span></div>
      <div class="history-meta">${_fmtTs(h.at)} · ${h.by}${h.reason ? ' — '+h.reason : ''}</div></div></div>`).join('');

  Modal.open({
    title: `${emp.name} · ${pos.name}`, maxWidth: '600px',
    body: `
      <div style="display:flex;align-items:center;gap:var(--sp-4);padding:var(--sp-4);background:var(--bg-3);border-radius:var(--r);margin-bottom:var(--sp-4)">
        ${_levelBadge(rec.currentLevel, rec.status)}
        <div>
          <div style="font-size:15px;font-weight:600">${t('level_'+rec.currentLevel)}</div>
          ${isPending ? `<span class="badge badge-pending">${t('pending_dual')} → ${t('level_'+rec.requestedLevel)}</span>`
                      : `<span class="badge badge-success">${t('approved')}</span>`}
        </div>
      </div>

      ${canPromote ? `<div class="card" style="margin-bottom:var(--sp-4)">
        <div class="card-header"><span class="card-title">${isPending ? t('second_approval') : t('promote_to') + ' ' + t('level_'+targetLv)}</span></div>
        <div class="card-body">
          <div class="form-grid-2" style="margin-bottom:var(--sp-3)">
            <div class="form-group"><label>${t('your_name')}</label><input type="text" id="appr-name"></div>
            <div class="form-group"><label>${t('your_role')}</label>
              <select id="appr-role">
                <option value="teamlead">${t('role_teamlead')}</option>
                <option value="supervisor">${t('role_supervisor')}</option>
              </select>
            </div>
          </div>
          <div class="form-group"><label>${t('comment_optional')}</label><input type="text" id="appr-comment" placeholder="…"></div>
          <div style="display:flex;gap:var(--sp-3);margin-top:var(--sp-4)">
            <button class="btn btn-primary" id="btn-promote">${t('promote_to')} ${t('level_'+targetLv)}</button>
            ${isSup && rec.currentLevel > 0 ? `<button class="btn btn-danger" id="btn-demote">${t('demote')}</button>` : ''}
          </div>
          <div class="form-error" id="promote-err" style="margin-top:var(--sp-2)"></div>
        </div>
      </div>` : `<div class="info-box" style="margin-bottom:var(--sp-4)">Already at maximum level (L4)${isSup ? ` — <a href="#" id="btn-demote" style="color:var(--red)">${t('demote')}</a>` : ''}</div>`}

      ${approvalHtml ? `<div class="card" style="margin-bottom:var(--sp-4)">
        <div class="card-header"><span class="card-title">${t('approval_chain')}</span></div>
        <div class="card-body" style="padding:var(--sp-3) var(--sp-4)">${approvalHtml}</div>
      </div>` : ''}

      <details><summary style="cursor:pointer;font-family:var(--font-mono);font-size:10px;color:var(--text-3);text-transform:uppercase;letter-spacing:.08em">${t('history')}</summary>
        <div style="margin-top:var(--sp-3)">${histHtml || `<div class="history-meta">${t('no_history')}</div>`}</div>
      </details>`
  });

  document.getElementById('btn-promote')?.addEventListener('click', async () => {
    const name = document.getElementById('appr-name').value.trim();
    const role = document.getElementById('appr-role').value;
    const comment = document.getElementById('appr-comment').value.trim();
    const errEl = document.getElementById('promote-err');
    errEl.textContent = '';
    const result = await skillService.promote(rec, name, role, comment);
    if (!result.ok) { errEl.textContent = t(result.error); return; }
    rec = result.newRecord;
    Modal.close();
    Toast[result.promoted ? 'success' : 'warn'](
      result.promoted ? `${emp.name} → ${t('level_'+rec.currentLevel)}` : `${t('pending_dual')}: ${emp.name} → ${t('level_'+rec.requestedLevel)}`
    );
    _refreshMatrixCell(empId, posId, rec);
  });

  document.getElementById('btn-demote')?.addEventListener('click', () => _openDemoteModal(rec, emp, pos));
}

function _refreshMatrixCell(empId, posId, rec) {
  const cell = document.querySelector(`td.td-skill[data-emp="${empId}"][data-pos="${posId}"]`);
  if (cell) cell.innerHTML = `<div class="level-cell lc-${rec.currentLevel}${rec.status==='pending_dual'?' pending':''}">${t('level_short_'+rec.currentLevel)}</div>`;
}

function _openDemoteModal(rec, emp, pos) {
  const opts = Array.from({length: rec.currentLevel}, (_, i) =>
    `<option value="${i}">${t('level_'+i)}</option>`).join('');
  Modal.open({
    title: `${t('demote')} — ${emp.name}`,
    body: `
      <div class="info-box warn" style="margin-bottom:var(--sp-4)">${emp.name} @ ${pos.name}: ${t('level_'+rec.currentLevel)}</div>
      <div class="form-grid-2">
        <div class="form-group"><label>${t('demote_to')}</label><select id="dem-level">${opts}</select></div>
        <div class="form-group"><label>${t('your_name')}</label><input type="text" id="dem-name"></div>
      </div>
      <div class="form-group"><label>${t('reason_required')}</label>
        <textarea id="dem-reason" placeholder="${t('demotion_reason_placeholder')}"></textarea>
        <div class="form-error" id="dem-err"></div>
      </div>`,
    footer: `<button class="btn btn-secondary" id="dem-cancel">${t('cancel')}</button>
             <button class="btn btn-danger" id="dem-ok">${t('confirm_demotion')}</button>`
  });
  document.getElementById('dem-cancel').onclick = Modal.close;
  document.getElementById('dem-ok').onclick = async () => {
    const level = +document.getElementById('dem-level').value;
    const name = document.getElementById('dem-name').value.trim();
    const reason = document.getElementById('dem-reason').value.trim();
    const result = await skillService.demote(rec, name, level, reason);
    if (!result.ok) { document.getElementById('dem-err').textContent = t(result.error); return; }
    Modal.close();
    Toast.success(`${t('demote')}: ${emp.name} → ${t('level_'+level)}`);
    _refreshMatrixCell(emp.id, pos.id, result.newRecord);
  };
}

function _renderRotationPlan(plan) {
  const el = document.getElementById('rotation-result');
  if (!el) return;
  const empName = id => AppState.employees.find(e => e.id === id)?.name || t('unknown');
  const posName = id => AppState.positions.find(p => p.id === id)?.name || t('unknown');
  const periods = ['A','B','C'];
  const pLabels = { A: t('period_a'), B: t('period_b'), C: t('period_c') };

  el.innerHTML = `
    <div class="flex-gap" style="margin-bottom:var(--sp-4)">
      <span style="font-family:var(--font-mono);font-size:11px;color:var(--text-3)">${plan.date}</span>
      ${plan.bbMode ? '<span class="badge badge-warning">BB MODE</span>' : ''}
      ${!plan.violations.length && !plan.gaps.filter(g=>g.reason!=='bb_skipped').length
        ? `<span class="badge badge-success">${t('rotation_clean')}</span>`
        : `<span class="badge badge-error">${plan.violations.length} violations · ${plan.gaps.filter(g=>g.reason!=='bb_skipped').length} gaps</span>`}
    </div>
    <div class="grid-3" style="margin-bottom:var(--sp-5)">
      ${periods.map(p => {
        const slots = plan.slots.filter(s => s.period === p);
        const gaps  = plan.gaps.filter(g => g.period === p && g.reason !== 'bb_skipped');
        return `<div class="card">
          <div class="card-header"><span class="card-title">${pLabels[p]}</span></div>
          <div style="padding:var(--sp-1) 0">
            ${slots.map(s => `<div style="display:flex;align-items:center;gap:var(--sp-3);padding:6px var(--sp-4)${s.violation?';background:rgba(239,68,68,.05)':''}">
              <span style="font-size:12px;color:var(--text);min-width:90px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${empName(s.employeeId)}</span>
              <span style="font-size:11px;color:var(--text-3);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${posName(s.positionId)}</span>
              ${s.violation ? `<span class="vio-tag vio-${(s.violationReason||'').replace('violation_','')}">${t(s.violationReason||'violation_repeat')}</span>` : ''}
            </div>`).join('')}
            ${gaps.map(g => `<div style="display:flex;align-items:center;gap:var(--sp-3);padding:6px var(--sp-4);background:rgba(239,68,68,.05)">
              <span style="font-size:12px;color:var(--red)">OPEN</span>
              <span style="font-size:11px;color:var(--text-3);flex:1">${posName(g.positionId)}</span>
              <span class="vio-tag vio-gap">${t('gap_label')}</span>
            </div>`).join('')}
            ${!slots.length && !gaps.length ? `<div style="padding:var(--sp-3) var(--sp-4);font-size:11px;color:var(--text-3)">No assignments</div>` : ''}
          </div>
        </div>`;
      }).join('')}
    </div>
    ${plan.suggestions.length ? `<div class="card">
      <div class="card-header"><span class="card-title">${t('who_train')}</span></div>
      <div style="padding:var(--sp-2) 0">
        ${plan.suggestions.slice(0,8).map(s => `<div style="display:flex;align-items:center;gap:var(--sp-3);padding:6px var(--sp-4)">
          <span style="font-size:12px;color:var(--text);min-width:120px">${s.positionName}</span>
          <span class="badge badge-error">${t('urgency')} ${s.urgencyScore}</span>
          <span style="font-size:11px;color:var(--text-3)">${s.candidates.slice(0,3).map(c=>c.name).join(', ')}</span>
        </div>`).join('')}
      </div>
    </div>` : ''}`;
}

Pages.attendance = async function() {
  const lineId = AppState.currentLineId;
  if (!lineId) { _rc(_noLine()); return; }
  const today = _today();
  await attendanceService.loadForDate(lineId, today);
  const employees = AppState.employees;
  const attMap = AppState.todayAttendance || new Map();

  _rc(`
    <div class="card">
      <div class="card-header">
        <span class="card-title">${t('today_attendance')} — ${today}</span>
        <button class="btn btn-primary btn-sm" id="save-att">${t('save_attendance')}</button>
      </div>
      <div style="overflow-x:auto">
        <table class="data-table">
          <thead><tr>
            <th>${t('col_employee')}</th><th>${t('col_status')}</th>
            <th>${t('partial_hours')}</th><th>${t('notes')}</th>
          </tr></thead>
          <tbody>
            ${employees.map(emp => {
              const rec = attMap.get(emp.id);
              const st = rec?.status || 'present';
              return `<tr data-emp="${emp.id}">
                <td class="td-name">${emp.name}</td>
                <td><select class="att-status" style="width:180px">
                  ${['present','absent_approved','absent_unapproved','partial'].map(s =>
                    `<option value="${s}"${st===s?' selected':''}>${t(s)}</option>`).join('')}
                </select></td>
                <td><input type="number" class="att-hours" min="0.5" max="11.5" step="0.5"
                  value="${rec?.partialHours||''}" style="width:80px;display:${st==='partial'?'block':'none'}"></td>
                <td><input type="text" class="att-notes" value="${rec?.notes||''}" style="width:200px"></td>
              </tr>`;
            }).join('')}
          </tbody>
        </table>
      </div>
    </div>`);

  document.querySelectorAll('.att-status').forEach(sel => {
    sel.onchange = () => {
      const hoursInput = sel.closest('tr').querySelector('.att-hours');
      if (hoursInput) hoursInput.style.display = sel.value === 'partial' ? 'block' : 'none';
    };
  });

  document.getElementById('save-att').onclick = async () => {
    const formData = Array.from(document.querySelectorAll('tr[data-emp]')).map(row => ({
      employeeId: +row.dataset.emp,
      status: row.querySelector('.att-status').value,
      partialHours: row.querySelector('.att-hours')?.value || null,
      notes: row.querySelector('.att-notes')?.value || null
    }));
    await attendanceService.saveAll(lineId, today, _deriveShift(), formData);
    Toast.success(t('attendance_saved'));
  };
};

function _deriveShift() {
  const h = new Date().getHours();
  if (h >= 6 && h < 14) return 'day';
  if (h >= 14 && h < 22) return 'afternoon';
  return 'night';
}

      ${!history.length ? `<div class="empty-state">No audit history</div>` :

function _showMappingReview(workbook, detection, lineId, binary, fileName, statusId) {
  const ws = workbook.Sheets[detection.sheet];
  const range = window.XLSX ? XLSX.utils.decode_range(ws['!ref']||'A1:A1') : {s:{r:0,c:0},e:{r:20,c:15}};
  let grid = `<div style="overflow:auto;max-height:260px;border:1px solid var(--border);border-radius:var(--r-sm);margin-bottom:var(--sp-4)"><table style="border-collapse:collapse;font-family:var(--font-mono);font-size:10px">`;
  for (let r = range.s.r; r <= Math.min(39, range.e.r); r++) {
    grid += '<tr>';
    for (let c = range.s.c; c <= Math.min(24, range.e.c); c++) {
      const addr = window.XLSX ? XLSX.utils.encode_cell({r,c}) : '';
      const val = ws[addr] ? String(ws[addr].v||'') : '';
      let bg = 'transparent';
      if (r === detection.headerRow) bg = 'rgba(245,158,11,.2)';
      else if (c === detection.rosterCol && r >= detection.firstRosterRow) bg = 'rgba(59,130,246,.2)';
      else if (r >= detection.firstRosterRow && c >= detection.firstPositionCol) bg = 'rgba(34,197,94,.08)';
      grid += `<td style="padding:2px 5px;border:1px solid var(--border);background:${bg};white-space:nowrap;max-width:80px;overflow:hidden;text-overflow:ellipsis">${val}</td>`;
    }
    grid += '</tr>';
  }
  grid += '</table></div>';

  const sheetOpts = workbook.SheetNames.map(s => `<option value="${s}"${s===detection.sheet?' selected':''}>${s}</option>`).join('');

  Modal.open({
    title: t('mapping_review'), maxWidth: '800px',
    body: `
      ${!detection.valid ? `<div class="info-box error" style="margin-bottom:var(--sp-4)">${(detection.errors||[]).join(' · ')}</div>` : ''}
      ${grid}
      <div style="font-size:10px;color:var(--text-3);font-family:var(--font-mono);margin-bottom:var(--sp-4)">🟡 Header &nbsp;🔵 Roster &nbsp;🟢 Skills Grid</div>
      <div class="form-grid-2">
        <div class="form-group"><label>Sheet</label><select id="map-sheet">${sheetOpts}</select></div>
        <div class="form-group"><label>${t('header_row')}</label><input type="number" id="map-header" value="${detection.headerRow+1}" min="1"></div>
        <div class="form-group"><label>${t('roster_col')}</label><input type="text" id="map-roster" value="${_colLetter(detection.rosterCol)}"></div>
        <div class="form-group"><label>${t('first_pos_col')}</label><input type="text" id="map-fpc" value="${_colLetter(detection.firstPositionCol)}"></div>
        <div class="form-group"><label>${t('first_roster_row')}</label><input type="number" id="map-frr" value="${detection.firstRosterRow+1}" min="1"></div>
      </div>
      <div id="map-val-result" style="margin-top:var(--sp-3)"></div>`,
    footer: `<button class="btn btn-secondary" id="map-cancel">${t('cancel')}</button>
             <button class="btn btn-secondary" id="map-validate">${t('validate_mapping')}</button>
             <button class="btn btn-primary" id="map-save">${t('confirm_mapping')}</button>`
  });

  const readForm = () => ({
    sheet: document.getElementById('map-sheet').value,
    headerRow: +document.getElementById('map-header').value - 1,
    rosterCol: _colIndex(document.getElementById('map-roster').value||'A'),
    firstPositionCol: _colIndex(document.getElementById('map-fpc').value||'C'),
    firstRosterRow: +document.getElementById('map-frr').value - 1,
  });

  document.getElementById('map-cancel').onclick = Modal.close;
  document.getElementById('map-validate').onclick = () => {
    const m = readForm();
    const v = templateMapper.validateOnly(workbook.Sheets[m.sheet], m);
    const el = document.getElementById('map-val-result');
    el.innerHTML = v.valid
      ? `<div class="info-box success">${t('validation_pass')}: ${v.positionHeaders} positions, ${v.rosterEntries} employees</div>`
      : `<div class="info-box error">${t('validation_fail')}: ${(v.errors||[]).join(' · ')}</div>`;
  };
  document.getElementById('map-save').onclick = async () => {
    const m = { ...readForm(), method: 'manual' };
    try {
      await importExportService.saveMapping(workbook, m, lineId, binary, fileName);
      Modal.close();
      Toast.success(t('template_manual'));
      await lineService.loadLineData(lineId);
      Pages.importExport();
    } catch(e) { Toast.error(e.message); }
  };
}

/* ══════════════════════════════════════════════════════════════

Pages.qr = function() {
  const lineId = AppState.currentLineId;
  const lines   = AppState.lines;
  _rc(`
    <div class="card">
      <div class="card-header"><span class="card-title">${t('page_qr')}</span></div>
      <div class="card-body">
        <p style="color:var(--text-2);margin-bottom:var(--sp-5)">${t('qr_desc')}</p>
        <div class="form-group" style="max-width:280px;margin-bottom:var(--sp-5)">
          <label>${t('select_line')}</label>
          <select id="qr-line-sel">
            ${lines.map(l=>`<option value="${l.id}"${l.id===lineId?' selected':''}>${l.name}</option>`).join('')}
          </select>
        </div>
        <div id="qr-display" style="display:flex;gap:var(--sp-8);align-items:flex-start;flex-wrap:wrap"></div>
        <p style="margin-top:var(--sp-5);font-size:11px;color:var(--text-3);font-family:var(--font-mono)">${t('qr_note')}</p>
      </div>
    </div>
    <div class="qr-print-sheet" style="display:none" id="qr-print-sheet"></div>`);

  const renderQR = selId => {
    const line = lines.find(l => l.id === selId);
    if (!line) return;
    const payload = `smapp://line/${selId}`;
    const display = document.getElementById('qr-display');
    display.innerHTML = `
      <div>
        <div id="qr-canvas" style="background:white;padding:12px;border-radius:var(--r);display:inline-block;border:1px solid var(--border)"></div>
        <div style="font-family:var(--font-mono);font-size:10px;color:var(--text-3);margin-top:var(--sp-2)">${t('qr_url_label')}: ${payload}</div>
      </div>
      <div style="flex:1;min-width:200px">
        <div style="font-size:22px;font-weight:700;color:var(--text);margin-bottom:var(--sp-4)">${line.name}</div>
        <div class="flex-gap">
          <button class="btn btn-primary" id="print-qr-btn">${t('print_qr')}</button>
          <a class="btn btn-secondary" href="index.html?qr=${selId}" target="_blank">${t('open_form')}</a>
        </div>
      </div>`;

    // Generate QR
    const qrDiv = document.getElementById('qr-canvas');
    if (window.QRCode) {
      new QRCode(qrDiv, { text: payload, width: 160, height: 160, colorDark: '#000000', colorLight: '#ffffff' });
    } else {
      qrDiv.innerHTML = `<div style="font-family:monospace;font-size:8px;color:#000;word-break:break-all;max-width:160px;padding:8px">${payload}</div>`;
    }

    // Print sheet
    const ps = document.getElementById('qr-print-sheet');
    ps.innerHTML = `
      <div class="qr-line-name">${line.name}</div>
      <div class="qr-image" id="qr-print-img"></div>
      <div class="qr-url">${payload}</div>
      <div class="qr-instructions-en">📱 Scan with your phone's camera or QR reader app</div>
      <div class="qr-instructions-es">📱 Escanea con la cámara de tu teléfono o una app de QR</div>`;
    if (window.QRCode) {
      new QRCode(document.getElementById('qr-print-img'), { text: payload, width: 240, height: 240, colorDark: '#000000', colorLight: '#ffffff' });
    }

    document.getElementById('print-qr-btn').onclick = () => {
      document.getElementById('qr-print-sheet').style.display = 'block';
      window.print();
      setTimeout(() => { document.getElementById('qr-print-sheet').style.display = 'none'; }, 1000);
    };
  };

  if (lineId) renderQR(lineId);
  document.getElementById('qr-line-sel').onchange = e => renderQR(+e.target.value);
};

/* ══════════════════════════════════════════════════════════════
   SYNC
══════════════════════════════════════════════════════════════ */
Pages.sync = async function() {
  const deviceRole = await DB.getSetting('deviceRole', 'authority');
  const lineId = AppState.currentLineId || await DB.getSetting('deviceLineId', null);
  deviceRole === 'field' ? _renderFieldSync(lineId) : _renderAuthSync();
};

async function _renderFieldSync(lineId) {
  const [logs, recs] = await Promise.all([
    lineId ? DB.getAllByIndex('trainingLogs','syncedToAuthority',false) : Promise.resolve([]),
    lineId ? DB.getAllByIndex('pendingRecommendations','syncedToAuthority',false) : Promise.resolve([])
  ]);
  const fl = logs.filter(l => l.lineId === lineId);
  const fr = recs.filter(r => r.lineId === lineId);
  const lastSync = await DB.getSetting('lastSyncAt', null);
  const seedV    = await DB.getSetting('seedVersion', 1);

  _rc(`
    <div class="card" style="margin-bottom:var(--sp-5)">
      <div class="card-header"><span class="card-title">${t('sync_export')}</span></div>
      <div class="card-body">
        <div class="grid-2" style="margin-bottom:var(--sp-5)">
          <div class="stat-card"><div class="stat-value">${fl.length}</div><div class="stat-label">${t('sync_pending_logs')}</div></div>
          <div class="stat-card"><div class="stat-value">${fr.length}</div><div class="stat-label">${t('sync_pending_recs')}</div></div>
        </div>
        <div style="font-family:var(--font-mono);font-size:11px;color:var(--text-3);margin-bottom:var(--sp-4)">
          ${t('sync_last')}: ${lastSync ? _fmtTs(lastSync) : t('sync_never')} &nbsp;·&nbsp; Seed v${seedV}
        </div>
        <button class="btn btn-primary" id="export-delta-btn">${t('sync_export')}</button>
      </div>
    </div>
    <div class="card">
      <div class="card-header"><span class="card-title">${t('sync_receipt')}</span></div>
      <div class="card-body">
        <div class="upload-zone" id="receipt-zone">
          <input type="file" id="receipt-file" accept=".json">
          <div class="upload-icon">📩</div>
          <span class="upload-label">Drop receipt JSON here</span>
        </div>
        <div id="receipt-status" style="margin-top:var(--sp-3)"></div>
      </div>
    </div>`);

  document.getElementById('export-delta-btn').onclick = async () => {
    if (!lineId) { Toast.error('No line set'); return; }
    try {
      const bundle = await syncService.exportDelta(lineId);
      if (!bundle) { Toast.warn(t('sync_nothing')); return; }
      const date = new Date().toISOString().slice(0,10);
      const src = (bundle.sourceDeviceId||'dev').slice(0,8);
      _downloadJSON(bundle, `delta_line${lineId}_${date}_${src}.json`);
      Toast.success(t('sync_exported'));
    } catch(e) { Toast.error(e.message); }
  };

  _setupUploadZone('receipt-zone','receipt-file', async f => {
    try {
      const receipt = JSON.parse(await f.text());
      const ids = receipt.results.filter(r=>r.status==='imported').map(r=>r.clientId);
      await syncService.markSynced(ids);
      await DB.setSetting('lastSyncAt', Date.now());
      document.getElementById('receipt-status').innerHTML = `<div class="info-box success">Marked ${ids.length} records as synced</div>`;
      Toast.success('Receipt imported');
    } catch(e) { Toast.error(e.message); }
  });
}

async function _renderAuthSync() {
  _rc(`
    <div class="card">
      <div class="card-header"><span class="card-title">${t('sync_import')}</span></div>
      <div class="card-body">
        <div class="upload-zone" id="delta-zone">
          <input type="file" id="delta-file" accept=".json">
          <div class="upload-icon">📦</div>
          <span class="upload-label">${t('sync_import')}</span>
          <span class="upload-hint">delta_line*.json</span>
        </div>
        <div id="delta-status" style="margin-top:var(--sp-4)"></div>
      </div>
    </div>`);

  _setupUploadZone('delta-zone','delta-file', async f => {
    const status = document.getElementById('delta-status');
    status.innerHTML = `<div class="info-box">${t('loading')}</div>`;
    try {
      const bundle = JSON.parse(await f.text());
      const results = await syncService.importDelta(bundle);
      const receipt = { schemaVersion:2, bundleId: bundle.bundleId, importedAt: Date.now(), results: results.details, unresolvedCount: results.unresolved };
      _downloadJSON(receipt, `receipt_${bundle.bundleId}.json`);
      status.innerHTML = `<div class="info-box success">
        ${results.imported} ${t('imported')} · ${results.skipped} ${t('skipped')} · ${results.errors} ${t('errors')}
        ${results.unresolved > 0 ? `<br><span style="color:var(--amber)">⚠ ${results.unresolved} ${t('unresolved')}</span>` : ''}
      </div>`;
      Toast.success(t('sync_imported'));
    } catch(e) {
      status.innerHTML = `<div class="info-box error">${e.message}</div>`;
      Toast.error(e.message);
    }
  });
}

                `<option value="${u.id}" data-name="${u.name}">${u.name} (${u.role==='teamlead'?'TL':'SUP'})</option>`).join('')}
            </select>
            <div class="form-error" id="err-trainer"></div>
          </div>

          <div class="form-group">
            <label>${t('duration')} * <span style="font-family:var(--font-mono);font-size:9px;color:var(--text-3)">${t('duration_hint')}</span></label>
            <input type="number" id="qf-duration" min="1" max="480" value="30" style="width:140px">
            <div class="form-error" id="err-duration"></div>
          </div>

          <div class="form-group">
            <label>${t('notes')}</label>
            <textarea id="qf-notes" maxlength="500" rows="3"></textarea>
            <div style="text-align:right;font-family:var(--font-mono);font-size:9px;color:var(--text-3)" id="notes-ctr">0/500</div>
          </div>

          <label class="checkbox-row" id="rec-row">
            <input type="checkbox" id="qf-recommend">
            <span class="checkbox-label">${t('recommend_level')}</span>
          </label>

          <div style="margin-top:var(--sp-5)">
            <button class="btn btn-primary btn-full btn-lg" id="qf-submit" ${!session?'disabled':''}>${t('submit_log')}</button>
          </div>
        </div>
      </div>
    </div>`);

  // Logger picker
  document.querySelectorAll('[data-logger-id]').forEach(btn => {
    btn.onclick = () => {
      Session.set(+btn.dataset.loggerId, btn.dataset.loggerRole, btn.dataset.loggerName);
      Pages.qrForm(lineId, lineData);
    };
  });

  document.getElementById('switch-logger')?.addEventListener('click', e => {
    e.preventDefault(); Session.clear(); Pages.qrForm(lineId, lineData);
  });

  // Notes counter
  document.getElementById('qf-notes').addEventListener('input', e => {
    document.getElementById('notes-ctr').textContent = `${e.target.value.length}/500`;
  });

  // Recommend row highlight
  document.getElementById('qf-recommend').addEventListener('change', e => {
    document.getElementById('rec-row').classList.toggle('checked', e.target.checked);
  });

  // Trainer ≠ trainee live guard
  document.getElementById('qf-trainee').addEventListener('change', () => {
    const trainee = document.getElementById('qf-trainee').value;
    const trainer = document.getElementById('qf-trainer');
    if (trainer.value && trainer.value === trainee) {
      trainer.value = '';
      document.getElementById('err-trainer').textContent = t('trainer_eq_trainee');
    } else {
      document.getElementById('err-trainer').textContent = '';
    }
  });

  // Submit
  document.getElementById('qf-submit').addEventListener('click', async () => {
    const curSession = Session.get();
    if (!curSession) return;

    const traineeEl  = document.getElementById('qf-trainee');
    const posEl      = document.getElementById('qf-position');
    const trainerEl  = document.getElementById('qf-trainer');
    const durationEl = document.getElementById('qf-duration');

    const traineeId  = +traineeEl.value;
    const posId      = +posEl.value;
    const trainerId  = trainerEl.value ? +trainerEl.value : null;
    const duration   = parseInt(durationEl.value);
    const notes      = document.getElementById('qf-notes').value.trim();
    const recommend  = document.getElementById('qf-recommend').checked;

    // Validate
    let valid = true;
    const setErr = (id, msg) => { document.getElementById(id).textContent = msg; if (msg) valid = false; };

    setErr('err-trainee',  !traineeId                   ? t('select_trainee') : '');
    setErr('err-position', !posId                       ? t('select_position') : '');
    setErr('err-trainer',  trainerId && trainerId===traineeId ? t('trainer_eq_trainee') : '');
    setErr('err-duration', isNaN(duration) || !durationEl.value ? t('duration_required')
                         : duration < 1  ? t('duration_min')
                         : duration > 480 ? t('duration_max') : '');
    if (!valid) return;

    // Duplicate guard (same emp+pos within 5 min)
    const recent = await DB.getAllByIndex('trainingLogs', 'lineTimestamp',
      IDBKeyRange.bound([lineId, Date.now()-300000], [lineId, Date.now()]));
    const dupe = recent.find(l => l.employeeId === traineeId && l.positionId === posId);
    if (dupe) {
      const ok = await confirmDialog(t('duplicate_log'));
      if (!ok) return;
    }

    const btn = document.getElementById('qf-submit');
    btn.disabled = true;
    btn.innerHTML = `<span class="spinner"></span>`;

    try {
      const traineeName = traineeEl.options[traineeEl.selectedIndex]?.dataset.name || '';
      const posName     = posEl.options[posEl.selectedIndex]?.dataset.name || '';
      const trainerName = trainerId ? (trainerEl.options[trainerEl.selectedIndex]?.dataset.name || '') : null;

      await trainingLogService.saveLog({
        lineId, employeeId: traineeId, employeeNameSnapshot: traineeName,
        positionId: posId, positionNameSnapshot: posName,
        trainerId, trainerNameSnapshot: trainerName,
        duration, notes, recommendLevelChange: recommend,
        shift: _deriveShift()
      });

      // Success feedback
      const bar = document.getElementById('log-success-bar');
      bar.style.display = 'block';
      bar.innerHTML = `<div class="confirm-banner">✓ ${traineeName} · ${posName} · ${duration} ${t('min')}</div>`;

      // Reset form
      traineeEl.value = '';
      posEl.value = '';
      trainerEl.value = '';
      durationEl.value = 30;
      document.getElementById('qf-notes').value = '';
      document.getElementById('notes-ctr').textContent = '0/500';
      document.getElementById('qf-recommend').checked = false;
      document.getElementById('rec-row').classList.remove('checked');
      traineeEl.focus();

      setTimeout(() => { bar.style.display = 'none'; btn.disabled = false; btn.textContent = t('submit_log'); }, 3000);
    } catch(e) {
      Toast.error(e.message);
      btn.disabled = false;
      btn.textContent = t('submit_log');
    }
  });
};

/**
 * App — Bootstrap, router, sidebar renderer, init.
 *
 * Boot contract:
 *   1. Every async step is wrapped with Boot.step() logging.
 *   2. DB.open() races against a 3-second timeout.
 *   3. App.init() always calls Boot.done() or Boot.fatal() — loader never stranded.
 *   4. All page renders are try/catch guarded.
 */

/* ─── Boot console (writes to #boot-console injected by index.html) ── */
const Boot = (() => {
  let _el = null;
  let _spinnerEl = null;

  function _panel() {
    if (!_el) _el = document.getElementById('boot-console');
    return _el;
  }

  function step(msg) {
    console.log('[Boot]', msg);
    const p = _panel();
    if (!p) return;
    const line = document.createElement('div');
    line.className = 'bc-line';
    line.textContent = '▸ ' + msg;
    p.appendChild(line);
    p.scrollTop = p.scrollHeight;
  }

  function warn(msg) {
    console.warn('[Boot]', msg);
    const p = _panel();
    if (!p) return;
    const line = document.createElement('div');
    line.className = 'bc-line bc-warn';
    line.textContent = '⚠ ' + msg;
    p.appendChild(line);
    p.scrollTop = p.scrollHeight;
  }

  function done() {
    step('App ready ✓');
    _hideLoader();
    // Collapse boot console after 3s
    setTimeout(() => {
      const p = _panel();
      if (p) p.style.display = 'none';
    }, 3000);
  }

  function fatal(msg, stack) {
    console.error('[Boot FATAL]', msg, stack);
    _hideLoader();

    document.getElementById('app').innerHTML = `
      <div style="
        position:fixed;inset:0;background:#0d0f12;
        display:flex;flex-direction:column;align-items:center;justify-content:center;
        padding:24px;z-index:99999;font-family:monospace;">
        <div style="max-width:640px;width:100%">
          <div style="display:flex;align-items:center;gap:12px;margin-bottom:20px">
            <div style="width:40px;height:40px;background:#ef4444;border-radius:4px;
              display:flex;align-items:center;justify-content:center;font-size:20px">✕</div>
            <div>
              <div style="color:#ef4444;font-size:13px;font-weight:700;letter-spacing:.08em;text-transform:uppercase">Boot Failed</div>
              <div style="color:#e8eaf0;font-size:16px;margin-top:2px">${_esc(msg)}</div>
            </div>
          </div>
          ${stack ? `<pre style="background:#1a1d26;color:#94a3b8;font-size:10px;padding:12px;
            border-radius:4px;overflow:auto;max-height:220px;margin-bottom:20px;
            border:1px solid #2a2f3a">${_esc(stack)}</pre>` : ''}
          <div style="display:flex;gap:12px;flex-wrap:wrap">
            <button onclick="location.reload()" style="
              padding:10px 20px;background:#f97316;color:#000;border:none;
              border-radius:4px;cursor:pointer;font-family:monospace;font-size:12px;font-weight:700">
              ↺ Reload
            </button>
            <button id="reset-btn" style="
              padding:10px 20px;background:#1a1d26;color:#ef4444;
              border:1px solid #ef4444;border-radius:4px;cursor:pointer;
              font-family:monospace;font-size:12px;font-weight:700">
              🗑 Reset Local Data &amp; Reload
            </button>
          </div>
          <div id="reset-status" style="margin-top:12px;font-size:11px;color:#94a3b8"></div>
        </div>
      </div>`;

    document.getElementById('reset-btn').onclick = async () => {
      const s = document.getElementById('reset-status');
      s.textContent = 'Deleting database…';
      try {
        if (window.indexedDB) {
          const req = indexedDB.deleteDatabase('SkillsMatrixDB');
          await new Promise((res, rej) => { req.onsuccess = res; req.onerror = rej; });
        }
        s.textContent = 'Done. Reloading…';
        setTimeout(() => location.reload(), 600);
      } catch(e) {
        s.textContent = 'Error: ' + e.message + ' — try reloading manually.';
      }
    };
  }

  function _hideLoader() {
    const loader = document.getElementById('app-loading');
    if (!loader) return;
    loader.style.opacity = '0';
    loader.style.transition = 'opacity 0.2s';
    setTimeout(() => { if (loader.parentNode) loader.parentNode.removeChild(loader); }, 250);
  }

  function _esc(s) {
    return String(s || '')
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  return { step, warn, done, fatal };
})();

const App = (() => {

  let _deviceRole   = 'authority';
  let _deviceLineId = null;
  let _currentPage  = 'dashboard';
  let _qrLineId     = null;

  /* ── Nav config ───────────────────────────────────────────────── */

    ]},
    { section: 'nav_section_skills', items: [

      { id: 'cross',        icon: '⟷', label: 'nav_cross' },
    ]},
    { section: 'nav_section_ops', items: [
      { id: 'rotation',     icon: '↻', label: 'nav_rotation' },
      { id: 'attendance',   icon: '☑', label: 'nav_attendance' },
      { id: 'audits',       icon: '⊛', label: 'nav_audits' },

      { id: 'setup',        icon: '⚙', label: 'nav_setup' },
    ]},
  ];

  const NAV_FIELD = [
    { section: 'nav_section_overview', items: [
      { id: 'qrForm', icon: '✎', label: 'nav_dashboard' },
      { id: 'sync',   icon: '⇌', label: 'nav_sync' },
    ]},
  ];

  /* ── Init ─────────────────────────────────────────────────────── */
  async function init() {
    try {
      Boot.step('Opening database…');
      await DB.open();

      if (DB.isMemoryMode) {
        Boot.warn('IndexedDB unavailable \u2014 using in-memory storage (data will not persist)');
      } else {
        Boot.step('Database opened ✓');
      }

      Boot.step('Loading settings…');
      const lang = await DB.getSetting('language', 'en');
      window._LANG = lang;

      _deviceRole   = await DB.getSetting('deviceRole',   'authority');
      _deviceLineId = await DB.getSetting('deviceLineId', null);
      Boot.step('Settings loaded ✓');

      // QR param
      const params = new URLSearchParams(window.location.search);
      _qrLineId = params.get('qr') ? parseInt(params.get('qr')) : null;

      Boot.step('Loading lines & users…');
      await lineService.loadAll();
      await lineService.loadUsers();
      Boot.step('Data loaded ✓');

      if (_deviceRole === 'field' && _deviceLineId) {
        Boot.step('Loading field line data…');
        await lineService.loadLineData(_deviceLineId);
      }

      Boot.step('Rendering shell…');
      _renderShell();

      if (DB.isMemoryMode) {
        _showMemoryBanner();
      }

      // Route
      if (_deviceRole === 'field') {
        if (!_deviceLineId) {
          Boot.step('Field device — showing provision page');
          _showProvisionPage();
          Boot.done();
          return;
        }
        _currentPage = 'qrForm';
        _renderNav();
        Boot.step('Rendering qrForm…');
        await _renderPage('qrForm');
      } else if (_qrLineId) {
        Boot.step('QR link mode…');
        await lineService.loadLineData(_qrLineId);
        _renderNav();
        _currentPage = 'qrForm';
        await _renderPage('qrForm');
      } else {
        const firstLine = AppState.lines[0];
        if (firstLine) {

          await lineService.loadLineData(firstLine.id);
        }
        _renderNav();
        _renderSidebarLineSelector();
        Boot.step('Navigating to dashboard…');
        await navigate('dashboard');

      Boot.fatal(e.message, e.stack);

    nav.innerHTML = html;

    nav.addEventListener('click', e => {
      const link = e.target.closest('[data-page]');
      if (!link) return;
      e.preventDefault();
      navigate(link.dataset.page);
    });
  }

  function _renderSidebarLineSelector() {
    const wrap = document.getElementById('line-selector-wrap');
    if (!wrap || _deviceRole === 'field') { if (wrap) wrap.style.display = 'none'; return; }

    const lines = AppState.lines;
    if (!lines.length) { wrap.innerHTML = ''; return; }

    wrap.innerHTML = `<select id="line-selector">
      <option value="">${t('select_line')}…</option>
      ${lines.map(l =>
        `<option value="${l.id}"${l.id === AppState.currentLineId ? ' selected' : ''}>${l.name}</option>`
      ).join('')}
    </select>`;

    document.getElementById('line-selector').addEventListener('change', async e => {
      const lineId = parseInt(e.target.value);
      if (!lineId) return;
      Boot.step(`Switching to line ${lineId}…`);
      await lineService.loadLineData(lineId);
      _renderNav();
      _reloadCurrentPage();
    });
  }

  function _updateSessionFooter() {
    const el = document.getElementById('session-info-footer');
    if (!el) return;
    const session = Session.get();
    el.innerHTML = session
      ? `<span class="session-name">${session.name}</span>
         <span style="font-size:9px;color:var(--text-3)">${t('role_'+session.role)}</span>`
      : '';
  }

  /* ── Router ───────────────────────────────────────────────────── */
  async function navigate(page) {
    _currentPage = page;
    document.querySelectorAll('.nav-item').forEach(el =>
      el.classList.toggle('active', el.dataset.page === page));
    _refreshPageTitle();
    await _renderPage(page);
    _updateSessionFooter();
    document.getElementById('main')?.scrollTo(0, 0);
  }

  async function _renderPage(page) {
    const contentEl = document.getElementById('page-content');
    if (!contentEl) return;
    contentEl.innerHTML =
      `<div style="padding:var(--sp-6);color:var(--text-3);font-family:var(--font-mono);font-size:12px">${t('loading')}</div>`;

    try {
      if (page === 'qrForm') {
        const lineId = _qrLineId || _deviceLineId || AppState.currentLineId;
        if (!lineId) { contentEl.innerHTML = _noLine(); return; }
        const [employees, positions] = await Promise.all([
          DB.getAllByIndex('employees', 'lineId', lineId),
          DB.getAllByIndex('positions', 'lineId', lineId),
        ]);
        await Pages.qrForm(lineId, {
          employees: employees.filter(e => e.active !== false),
          positions
        });
      } else if (page === 'importExport' && !window.XLSX) {
        contentEl.innerHTML = `
          <div class="card" style="max-width:560px;margin:var(--sp-8) auto">
            <div class="card-header"><span class="card-title">Import / Export</span></div>
            <div class="card-body">
              <div class="info-box warn" style="margin-bottom:var(--sp-4)">
                <strong>xlsx.full.min.js</strong> is required for Import/Export.<br>
                Download it from cdnjs.cloudflare.com and place it in the <code>libs/</code> folder,
                then reload.
              </div>
              <a href="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"
                target="_blank" rel="noopener" class="btn btn-secondary">
                Download xlsx.full.min.js ↗
              </a>
            </div>
          </div>`;
      } else if (page === 'qr' && !window.QRCode) {
        // QR page still renders — it shows text fallback; Pages.qr handles it
        await Pages[page]();
      } else if (Pages[page]) {
        await Pages[page]();
      } else {
        contentEl.innerHTML = `<div class="empty-state">Page not found: ${page}</div>`;
      }
    } catch(e) {
      console.error(`[page:${page}]`, e);
      contentEl.innerHTML = `
        <div class="info-box error" style="margin:var(--sp-5)">
          <strong>Error loading page: ${_esc(page)}</strong><br>
          ${_esc(e.message)}
          <pre style="font-size:10px;margin-top:8px;color:var(--text-3);
            overflow:auto;max-height:200px">${_esc(e.stack || '')}</pre>
          <button onclick="App.navigate('${page}')" class="btn btn-secondary"
            style="margin-top:12px">Retry</button>
        </div>`;
    }
  }

  function _esc(s) {
    return String(s || '')
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function _refreshPageTitle() {
    const titleMap = {
      dashboard:'page_dashboard', matrix:'page_matrix', approvals:'page_approvals',
      cross:'page_cross', rotation:'page_rotation', attendance:'page_attendance',
      audits:'page_audits', importExport:'page_import_export', qr:'page_qr',
      reports:'page_reports', sync:'page_sync', setup:'page_setup', qrForm:'log_training'
    };
    const el = document.getElementById('topbar-title');
    if (el) el.textContent = t(titleMap[_currentPage] || 'app_name');
  }

  function _reloadCurrentPage() { navigate(_currentPage); }

  /* ── Provision page ───────────────────────────────────────────── */
  function _showProvisionPage() {
    document.getElementById('app').innerHTML = `
      <div class="overlay-page">
        <div class="overlay-logo">
          <div class="logo-mark-lg">SM</div>
          <div>
            <div class="logo-text-lg">SkillOps</div>
            <div style="font-size:12px;color:var(--text-3);font-family:var(--font-mono)">${t('field')}</div>
          </div>
        </div>
        <div class="card" style="max-width:460px;width:100%">
          <div class="card-header"><span class="card-title">${t('provision_title')}</span></div>
          <div class="card-body">
            <p style="color:var(--text-2);margin-bottom:var(--sp-5)">${t('provision_desc')}</p>
            <div class="upload-zone" id="seed-zone">
              <input type="file" id="seed-file" accept=".json">
              <div class="upload-icon">📱</div>
              <span class="upload-label">${t('provision_load')}</span>
              <span class="upload-hint">${t('provision_hint')}</span>
            </div>
            <div id="prov-status" style="margin-top:var(--sp-4)"></div>
          </div>
        </div>
      </div>
      <div id="toast-container"></div>`;

    const zone  = document.getElementById('seed-zone');
    const input = document.getElementById('seed-file');
    zone.onclick = () => input.click();
    input.onchange = async e => { if (e.target.files[0]) await _doProvision(e.target.files[0]); };
    zone.ondragover  = e => { e.preventDefault(); zone.classList.add('drag-over'); };
    zone.ondragleave = () => zone.classList.remove('drag-over');
    zone.ondrop = e => {
      e.preventDefault(); zone.classList.remove('drag-over');
      if (e.dataTransfer.files[0]) _doProvision(e.dataTransfer.files[0]);
    };
  }

  async function _doProvision(file) {
    const status = document.getElementById('prov-status');
    status.innerHTML = `<div class="info-box">${t('loading')}</div>`;
    try {
      const seed = JSON.parse(await file.text());
      await syncService.importSeed(seed);
      status.innerHTML = `<div class="info-box success">${t('provision_success')}</div>`;
      setTimeout(() => location.reload(), 1200);
    } catch(e) {
      status.innerHTML = `<div class="info-box error">${t('provision_error')}: ${e.message}</div>`;
    }
  }

  /* ── Public ───────────────────────────────────────────────────── */
  function setLogger(id, role, name) {
    Session.set(id, role, name);
    _updateSessionFooter();
    _reloadCurrentPage();
  }

  return { init, navigate, renderSidebar, setLogger };
})();

/* ── Shared helpers (must be global for pages.js) ─────────────────── */
function _noLine() {
  return `<div class="empty-state"><div class="empty-icon">⚙</div><p>${t('no_line_selected')}</p></div>`;
}

/* ── Entry point ──────────────────────────────────────────────────── */
document.addEventListener('DOMContentLoaded', () => {
  Boot.step('DOMContentLoaded — starting App.init()');
  App.init(); // errors handled internally by Boot.fatal()
});

  </script>
</body>
</html>
