<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Skills Matrix</title>
  <style>
/* css/reset.css */


/* css/tokens.css */
/* Google Fonts @import removed — it blocks window.load on file://, keeping
   the boot spinner alive for 30+ seconds. System fonts used as fallback.
   To use IBM Plex: download woff2 files to libs/fonts/ and add @font-face rules here. */

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  /* Core palette */
  --bg:        #0d0f12;
  --bg-2:      #13161b;
  --bg-3:      #1a1e25;
  --bg-4:      #222730;
  --border:    #2a2f3a;
  --border-2:  #353c4a;
  --text:      #e8eaf0;
  --text-2:    #9aa0b0;
  --text-3:    #5a6070;
  --accent:    #f97316;
  --accent-dim:#7c3a0f;
  --accent-glow: rgba(249,115,22,0.15);

  /* Status */
  --green:     #22c55e;
  --green-dim: #14532d;
  --red:       #ef4444;
  --red-dim:   #7f1d1d;
  --amber:     #f59e0b;
  --amber-dim: #78350f;
  --blue:      #3b82f6;
  --blue-dim:  #1e3a8a;
  --purple:    #a855f7;
  --purple-dim:#581c87;

  /* Skill level colors */
  --l1: #3b82f6; --l1-dim: rgba(59,130,246,0.15);
  --l2: #f59e0b; --l2-dim: rgba(245,158,11,0.15);
  --l3: #22c55e; --l3-dim: rgba(34,197,94,0.15);
  --l4: #a855f7; --l4-dim: rgba(168,85,247,0.15);

  /* Typography */
  --font-mono: 'IBM Plex Mono', 'Courier New', monospace;
  --font-sans: 'IBM Plex Sans', 'Helvetica Neue', sans-serif;

  /* Spacing */
  --sp-1: 4px; --sp-2: 8px; --sp-3: 12px; --sp-4: 16px;
  --sp-5: 20px; --sp-6: 24px; --sp-8: 32px; --sp-10: 40px;

  /* Radius */
  --r-sm: 3px; --r: 5px; --r-lg: 8px;

  /* Transitions */
  --t: 0.15s ease;
}

html { font-size: 14px; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-sans);
  font-size: 14px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  min-height: 100vh;
  overflow-x: hidden;
}

/* Scrollbars */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: var(--bg-2); }
::-webkit-scrollbar-thumb { background: var(--border-2); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--text-3); }

/* Selection */
::selection { background: var(--accent-dim); color: var(--accent); }


/* css/layout.css */
/* ═══════════════════════════════════════════════════
   APP SHELL
═══════════════════════════════════════════════════ */
#app { display: flex; flex-direction: column; min-height: 100vh; }

.app-shell {
  display: grid;
  grid-template-columns: 220px 1fr;
  grid-template-rows: 48px 1fr;
  grid-template-areas: "sidebar topbar" "sidebar main";
  min-height: 100vh;
}
.app-shell.sidebar-collapsed {
  grid-template-columns: 48px 1fr;
}

/* ═══════════════════════════════════════════════════
   SIDEBAR
═══════════════════════════════════════════════════ */
.sidebar {
  grid-area: sidebar;
  background: var(--bg-2);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  position: sticky;
  top: 0;
  height: 100vh;
}

.sidebar-logo {
  display: flex;
  align-items: center;
  gap: var(--sp-3);
  padding: 0 var(--sp-4);
  height: 48px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}

.sidebar-logo .logo-mark {
  width: 28px; height: 28px;
  background: var(--accent);
  display: flex; align-items: center; justify-content: center;
  font-family: var(--font-mono);
  font-weight: 600;
  font-size: 12px;
  color: #000;
  border-radius: var(--r-sm);
  flex-shrink: 0;
}

.sidebar-logo .logo-text {
  font-family: var(--font-mono);
  font-size: 11px;
  font-weight: 600;
  color: var(--text);
  letter-spacing: 0.08em;
  text-transform: uppercase;
  white-space: nowrap;
}

.sidebar-line-selector {
  padding: var(--sp-3) var(--sp-4);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}

.sidebar-line-selector select {
  width: 100%;
  background: var(--bg-3);
  border: 1px solid var(--border);
  color: var(--text);
  font-family: var(--font-mono);
  font-size: 11px;
  padding: var(--sp-2) var(--sp-3);
  border-radius: var(--r-sm);
  cursor: pointer;
  outline: none;
}
.sidebar-line-selector select:focus {
  border-color: var(--accent);
}

.sidebar-nav { flex: 1; overflow-y: auto; padding: var(--sp-3) 0; }

.nav-section-label {
  font-family: var(--font-mono);
  font-size: 9px;
  font-weight: 600;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--text-3);
  padding: var(--sp-2) var(--sp-4) var(--sp-1);
}

.nav-item {
  display: flex;
  align-items: center;
  gap: var(--sp-3);
  padding: var(--sp-2) var(--sp-4);
  font-size: 12.5px;
  color: var(--text-2);
  cursor: pointer;
  border-radius: 0;
  border-left: 2px solid transparent;
  transition: color var(--t), background var(--t), border-color var(--t);
  white-space: nowrap;
  text-decoration: none;
}

.nav-item:hover {
  color: var(--text);
  background: var(--bg-3);
}

.nav-item.active {
  color: var(--accent);
  background: var(--accent-glow);
  border-left-color: var(--accent);
  font-weight: 500;
}

.nav-item .nav-icon {
  width: 16px; height: 16px;
  opacity: 0.7;
  flex-shrink: 0;
}

.nav-item.active .nav-icon { opacity: 1; }

.nav-badge {
  margin-left: auto;
  background: var(--red);
  color: white;
  font-family: var(--font-mono);
  font-size: 9px;
  font-weight: 600;
  padding: 1px 5px;
  border-radius: 9px;
  min-width: 16px;
  text-align: center;
}

.sidebar-footer {
  border-top: 1px solid var(--border);
  padding: var(--sp-3) var(--sp-4);
  flex-shrink: 0;
}

.lang-toggle {
  display: flex;
  gap: var(--sp-1);
  align-items: center;
  margin-bottom: var(--sp-2);
}

.lang-btn {
  font-family: var(--font-mono);
  font-size: 10px;
  font-weight: 600;
  padding: 2px 7px;
  border-radius: var(--r-sm);
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text-3);
  cursor: pointer;
  transition: all var(--t);
}
.lang-btn.active {
  background: var(--accent);
  border-color: var(--accent);
  color: #000;
}

.session-info {
  font-size: 11px;
  color: var(--text-3);
  font-family: var(--font-mono);
}
.session-name {
  color: var(--text-2);
  font-size: 11px;
  display: block;
}

/* ═══════════════════════════════════════════════════
   TOPBAR
═══════════════════════════════════════════════════ */
.topbar {
  grid-area: topbar;
  background: var(--bg-2);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 var(--sp-6);
  gap: var(--sp-4);
}

.topbar-title {
  font-family: var(--font-mono);
  font-size: 12px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--text-2);
}

.topbar-actions { margin-left: auto; display: flex; gap: var(--sp-3); align-items: center; }

.device-badge {
  font-family: var(--font-mono);
  font-size: 9px;
  font-weight: 600;
  padding: 2px 7px;
  border-radius: var(--r-sm);
  letter-spacing: 0.06em;
}
.device-badge.authority { background: var(--accent-dim); color: var(--accent); }
.device-badge.field { background: var(--blue-dim); color: var(--blue); }

/* ═══════════════════════════════════════════════════
   MAIN CONTENT
═══════════════════════════════════════════════════ */
.main-content {
  grid-area: main;
  overflow-y: auto;
  overflow-x: hidden;
  padding: var(--sp-6);
  background: var(--bg);
}

.page-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: var(--sp-6);
  gap: var(--sp-4);
}

.page-title {
  font-family: var(--font-mono);
  font-size: 15px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--text);
}

.page-subtitle {
  font-size: 12px;
  color: var(--text-3);
  margin-top: 2px;
  font-family: var(--font-mono);
}

/* Full-screen overlay pages (session, provision) */
.overlay-page {
  position: fixed;
  inset: 0;
  background: var(--bg);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 1000;
  padding: var(--sp-8);
}

.overlay-logo {
  display: flex;
  align-items: center;
  gap: var(--sp-4);
  margin-bottom: var(--sp-10);
}

.overlay-logo .logo-mark-lg {
  width: 48px; height: 48px;
  background: var(--accent);
  display: flex; align-items: center; justify-content: center;
  font-family: var(--font-mono);
  font-weight: 600;
  font-size: 18px;
  color: #000;
  border-radius: var(--r);
}

.overlay-logo .logo-text-lg {
  font-family: var(--font-mono);
  font-size: 16px;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
}

/* Responsive */
@media (max-width: 768px) {
  .app-shell {
    grid-template-columns: 1fr;
    grid-template-rows: 48px 48px 1fr;
    grid-template-areas: "topbar" "sidebar" "main";
  }
  .sidebar {
    height: auto;
    position: relative;
    flex-direction: row;
    overflow-x: auto;
    overflow-y: hidden;
  }
  .sidebar-nav { display: flex; flex-direction: row; overflow-y: visible; padding: 0; }
  .nav-section-label { display: none; }
  .nav-item { flex-direction: column; gap: 2px; font-size: 10px; padding: var(--sp-2) var(--sp-3); }
  .sidebar-footer, .sidebar-logo, .sidebar-line-selector { display: none; }
  .main-content { padding: var(--sp-4); }
}


/* css/components.css */
/* ═══════════════════════════════════════════════════
   BUTTONS
═══════════════════════════════════════════════════ */
.btn {
  display: inline-flex; align-items: center; justify-content: center;
  gap: var(--sp-2);
  font-family: var(--font-mono);
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  padding: 7px 14px;
  border-radius: var(--r-sm);
  border: 1px solid transparent;
  cursor: pointer;
  transition: all var(--t);
  white-space: nowrap;
  text-decoration: none;
  line-height: 1;
}
.btn:disabled { opacity: 0.4; cursor: not-allowed; }

.btn-primary { background: var(--accent); color: #000; border-color: var(--accent); }
.btn-primary:hover:not(:disabled) { background: #fb923c; border-color: #fb923c; }

.btn-secondary { background: transparent; color: var(--text-2); border-color: var(--border-2); }
.btn-secondary:hover:not(:disabled) { color: var(--text); border-color: var(--text-3); background: var(--bg-3); }

.btn-danger { background: transparent; color: var(--red); border-color: var(--red); }
.btn-danger:hover:not(:disabled) { background: var(--red-dim); }

.btn-ghost { background: transparent; color: var(--text-3); border-color: transparent; }
.btn-ghost:hover:not(:disabled) { color: var(--text-2); background: var(--bg-3); }

.btn-sm { padding: 4px 10px; font-size: 10px; }
.btn-lg { padding: 12px 24px; font-size: 12px; }
.btn-full { width: 100%; }
.btn-icon { padding: 7px; width: 32px; height: 32px; }

.btn .spinner {
  width: 12px; height: 12px;
  border: 2px solid rgba(0,0,0,0.3);
  border-top-color: currentColor;
  border-radius: 50%;
  animation: spin 0.6s linear infinite;
}

@keyframes spin { to { transform: rotate(360deg); } }

/* ═══════════════════════════════════════════════════
   CARDS
═══════════════════════════════════════════════════ */
.card {
  background: var(--bg-2);
  border: 1px solid var(--border);
  border-radius: var(--r);
  overflow: hidden;
}

.card-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: var(--sp-4) var(--sp-5);
  border-bottom: 1px solid var(--border);
}

.card-title {
  font-family: var(--font-mono);
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--text-2);
}

.card-body { padding: var(--sp-5); }

/* Stat card */
.stat-card {
  background: var(--bg-2);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: var(--sp-5);
  position: relative;
  overflow: hidden;
}
.stat-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: var(--stat-color, var(--accent));
}
.stat-value {
  font-family: var(--font-mono);
  font-size: 28px;
  font-weight: 600;
  line-height: 1;
  color: var(--text);
  margin-bottom: 4px;
}
.stat-label {
  font-family: var(--font-mono);
  font-size: 9px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--text-3);
}
.stat-sub {
  font-size: 11px;
  color: var(--text-3);
  margin-top: 4px;
}

/* ═══════════════════════════════════════════════════
   FORMS
═══════════════════════════════════════════════════ */
.form-group { margin-bottom: var(--sp-4); }
.form-group:last-child { margin-bottom: 0; }

label, .form-label {
  display: block;
  font-family: var(--font-mono);
  font-size: 10px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--text-3);
  margin-bottom: var(--sp-2);
}

input[type="text"],
input[type="number"],
input[type="email"],
input[type="date"],
select,
textarea {
  width: 100%;
  background: var(--bg-3);
  border: 1px solid var(--border);
  color: var(--text);
  font-family: var(--font-mono);
  font-size: 12px;
  padding: 8px 10px;
  border-radius: var(--r-sm);
  outline: none;
  transition: border-color var(--t);
  appearance: none;
}

input:focus, select:focus, textarea:focus {
  border-color: var(--accent);
  background: var(--bg-4);
}

input.error, select.error, textarea.error {
  border-color: var(--red);
}

.form-error {
  font-size: 11px;
  color: var(--red);
  margin-top: 4px;
  font-family: var(--font-mono);
}

textarea { resize: vertical; min-height: 80px; line-height: 1.6; }

select option { background: var(--bg-3); }

.checkbox-row {
  display: flex;
  align-items: flex-start;
  gap: var(--sp-3);
  padding: var(--sp-3);
  border-radius: var(--r-sm);
  border: 1px solid var(--border);
  cursor: pointer;
  transition: border-color var(--t), background var(--t);
}
.checkbox-row:hover { border-color: var(--border-2); background: var(--bg-3); }
.checkbox-row.checked { border-color: var(--amber); background: rgba(245,158,11,0.06); }

.checkbox-row input[type="checkbox"] {
  width: 16px; height: 16px;
  flex-shrink: 0;
  margin-top: 1px;
  accent-color: var(--accent);
}
.checkbox-row input { width: auto; }

.checkbox-label {
  font-size: 12px;
  color: var(--text-2);
  cursor: pointer;
  font-family: var(--font-sans);
  text-transform: none;
  letter-spacing: 0;
  font-weight: 400;
}

/* Grid 2-col */
.form-grid-2 {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: var(--sp-4);
}

/* ═══════════════════════════════════════════════════
   BADGES
═══════════════════════════════════════════════════ */
.badge {
  display: inline-flex; align-items: center;
  font-family: var(--font-mono);
  font-size: 9px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  padding: 2px 6px;
  border-radius: var(--r-sm);
  border: 1px solid transparent;
  white-space: nowrap;
}

.badge-l0 { background: var(--bg-4); color: var(--text-3); border-color: var(--border); }
.badge-l1 { background: var(--l1-dim); color: var(--l1); }
.badge-l2 { background: var(--l2-dim); color: var(--l2); }
.badge-l3 { background: var(--l3-dim); color: var(--l3); }
.badge-l4 { background: var(--l4-dim); color: var(--l4); }
.badge-pending { background: rgba(245,158,11,0.1); color: var(--amber); border-color: var(--amber); border-style: dashed; }
.badge-met { background: var(--green-dim); color: var(--green); }
.badge-partial { background: var(--amber-dim); color: var(--amber); }
.badge-critical { background: var(--red-dim); color: var(--red); }
.badge-success { background: var(--green-dim); color: var(--green); }
.badge-error { background: var(--red-dim); color: var(--red); }
.badge-info { background: var(--blue-dim); color: var(--blue); }
.badge-warning { background: var(--amber-dim); color: var(--amber); }

/* Level cell (matrix) */
.level-cell {
  width: 28px; height: 28px;
  display: flex; align-items: center; justify-content: center;
  border-radius: var(--r-sm);
  font-family: var(--font-mono);
  font-size: 11px;
  font-weight: 600;
  cursor: pointer;
  transition: transform var(--t), box-shadow var(--t);
  flex-shrink: 0;
}
.level-cell:hover { transform: scale(1.15); z-index: 2; position: relative; }
.level-cell.lc-0 { background: var(--bg-4); color: var(--text-3); }
.level-cell.lc-1 { background: var(--l1-dim); color: var(--l1); }
.level-cell.lc-2 { background: var(--l2-dim); color: var(--l2); }
.level-cell.lc-3 { background: var(--l3-dim); color: var(--l3); }
.level-cell.lc-4 { background: var(--l4-dim); color: var(--l4); }
.level-cell.pending { outline: 2px dashed var(--amber); outline-offset: 1px; }

/* ═══════════════════════════════════════════════════
   TABLES
═══════════════════════════════════════════════════ */
.data-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 12px;
}

.data-table th {
  font-family: var(--font-mono);
  font-size: 9px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--text-3);
  padding: var(--sp-3) var(--sp-4);
  text-align: left;
  border-bottom: 1px solid var(--border);
  white-space: nowrap;
}

.data-table td {
  padding: var(--sp-3) var(--sp-4);
  border-bottom: 1px solid var(--border);
  color: var(--text-2);
  vertical-align: middle;
}

.data-table tbody tr:hover td { background: var(--bg-3); }
.data-table tbody tr:last-child td { border-bottom: none; }

.data-table .td-name { color: var(--text); font-weight: 500; }
.data-table .td-mono { font-family: var(--font-mono); font-size: 11px; }
.data-table .td-actions { text-align: right; white-space: nowrap; }

/* ═══════════════════════════════════════════════════
   MODAL
═══════════════════════════════════════════════════ */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.75);
  backdrop-filter: blur(2px);
  display: flex; align-items: center; justify-content: center;
  z-index: 500;
  padding: var(--sp-6);
  animation: fadeIn 0.1s ease;
}

@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes slideUp { from { transform: translateY(16px); opacity: 0; } to { transform: none; opacity: 1; } }

.modal {
  background: var(--bg-2);
  border: 1px solid var(--border-2);
  border-radius: var(--r-lg);
  width: 100%;
  max-width: 560px;
  max-height: 90vh;
  display: flex; flex-direction: column;
  animation: slideUp 0.15s ease;
}

.modal-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: var(--sp-4) var(--sp-5);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}

.modal-title {
  font-family: var(--font-mono);
  font-size: 12px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--text);
}

.modal-close {
  background: none; border: none;
  color: var(--text-3); cursor: pointer; font-size: 18px;
  width: 28px; height: 28px;
  display: flex; align-items: center; justify-content: center;
  border-radius: var(--r-sm);
  transition: color var(--t), background var(--t);
}
.modal-close:hover { color: var(--text); background: var(--bg-3); }

.modal-body {
  padding: var(--sp-5);
  overflow-y: auto;
  flex: 1;
}

.modal-footer {
  padding: var(--sp-4) var(--sp-5);
  border-top: 1px solid var(--border);
  display: flex;
  gap: var(--sp-3);
  justify-content: flex-end;
  flex-shrink: 0;
}

/* ═══════════════════════════════════════════════════
   TOAST
═══════════════════════════════════════════════════ */
#toast-container {
  position: fixed;
  bottom: var(--sp-6);
  right: var(--sp-6);
  display: flex; flex-direction: column;
  gap: var(--sp-3);
  z-index: 9999;
  pointer-events: none;
}

.toast {
  display: flex;
  align-items: flex-start;
  gap: var(--sp-3);
  background: var(--bg-3);
  border: 1px solid var(--border-2);
  border-left-width: 3px;
  border-radius: var(--r);
  padding: var(--sp-3) var(--sp-4);
  min-width: 260px;
  max-width: 380px;
  pointer-events: all;
  cursor: pointer;
  animation: slideUp 0.2s ease;
  box-shadow: 0 8px 32px rgba(0,0,0,0.4);
}
.toast.removing { animation: fadeOut 0.2s ease forwards; }
@keyframes fadeOut { to { opacity: 0; transform: translateX(16px); } }

.toast.success { border-left-color: var(--green); }
.toast.error   { border-left-color: var(--red); }
.toast.warning { border-left-color: var(--amber); }
.toast.info    { border-left-color: var(--blue); }

.toast-msg {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--text-2);
  line-height: 1.5;
  flex: 1;
}

/* ═══════════════════════════════════════════════════
   TABS
═══════════════════════════════════════════════════ */
.tabs {
  display: flex;
  gap: 0;
  border-bottom: 1px solid var(--border);
  margin-bottom: var(--sp-5);
}

.tab-btn {
  font-family: var(--font-mono);
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  padding: var(--sp-3) var(--sp-5);
  background: none;
  border: none;
  border-bottom: 2px solid transparent;
  color: var(--text-3);
  cursor: pointer;
  transition: all var(--t);
  margin-bottom: -1px;
}
.tab-btn:hover { color: var(--text-2); }
.tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }

.tab-panel { display: none; }
.tab-panel.active { display: block; }

/* ═══════════════════════════════════════════════════
   MISC COMPONENTS
═══════════════════════════════════════════════════ */
.divider { height: 1px; background: var(--border); margin: var(--sp-5) 0; }

.empty-state {
  text-align: center;
  padding: var(--sp-10) var(--sp-6);
  color: var(--text-3);
  font-family: var(--font-mono);
  font-size: 12px;
}

.empty-state .empty-icon { font-size: 32px; margin-bottom: var(--sp-4); }

.progress-bar-wrap {
  height: 6px;
  background: var(--bg-4);
  border-radius: 3px;
  overflow: hidden;
}
.progress-bar-fill {
  height: 100%;
  border-radius: 3px;
  transition: width 0.3s ease;
  background: var(--accent);
}
.progress-bar-fill.green { background: var(--green); }
.progress-bar-fill.red   { background: var(--red); }
.progress-bar-fill.amber { background: var(--amber); }

/* Grid layouts */
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: var(--sp-4); }
.grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: var(--sp-4); }
.grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: var(--sp-4); }

@media (max-width: 900px) {
  .grid-3, .grid-4 { grid-template-columns: 1fr 1fr; }
}
@media (max-width: 600px) {
  .grid-2, .grid-3, .grid-4 { grid-template-columns: 1fr; }
}

.flex-between { display: flex; justify-content: space-between; align-items: center; }
.flex-gap { display: flex; gap: var(--sp-3); align-items: center; flex-wrap: wrap; }

/* Upload zone */
.upload-zone {
  border: 2px dashed var(--border-2);
  border-radius: var(--r);
  padding: var(--sp-8) var(--sp-6);
  text-align: center;
  cursor: pointer;
  transition: all var(--t);
}
.upload-zone:hover, .upload-zone.drag-over {
  border-color: var(--accent);
  background: var(--accent-glow);
}
.upload-zone input[type="file"] { display: none; }
.upload-zone .upload-icon { font-size: 28px; margin-bottom: var(--sp-3); }
.upload-zone .upload-label {
  font-family: var(--font-mono);
  font-size: 12px;
  color: var(--text-2);
  display: block;
  margin-bottom: var(--sp-2);
}
.upload-zone .upload-hint {
  font-size: 11px;
  color: var(--text-3);
  font-family: var(--font-mono);
}

/* Violation tags */
.vio-tag {
  display: inline-flex; align-items: center;
  font-family: var(--font-mono);
  font-size: 8px;
  font-weight: 700;
  letter-spacing: 0.06em;
  padding: 1px 5px;
  border-radius: 2px;
  border: 1px solid;
}
.vio-repeat   { color: var(--amber); border-color: var(--amber); background: rgba(245,158,11,0.1); }
.vio-double   { color: var(--red);   border-color: var(--red);   background: rgba(239,68,68,0.1); }
.vio-underq   { color: var(--blue);  border-color: var(--blue);  background: rgba(59,130,246,0.1); }
.vio-gap      { color: var(--red);   border-color: var(--red);   background: rgba(239,68,68,0.08); }

/* Info box */
.info-box {
  background: var(--bg-3);
  border: 1px solid var(--border);
  border-left: 3px solid var(--blue);
  border-radius: var(--r-sm);
  padding: var(--sp-3) var(--sp-4);
  font-size: 12px;
  color: var(--text-2);
  line-height: 1.6;
}
.info-box.warn { border-left-color: var(--amber); }
.info-box.error { border-left-color: var(--red); }
.info-box.success { border-left-color: var(--green); }

/* History entry */
.history-entry {
  padding: var(--sp-3) 0;
  border-bottom: 1px solid var(--border);
  display: flex;
  gap: var(--sp-3);
  align-items: flex-start;
}
.history-entry:last-child { border-bottom: none; }
.history-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--border-2);
  flex-shrink: 0;
  margin-top: 5px;
}
.history-dot.promotion { background: var(--green); }
.history-dot.demotion  { background: var(--red); }
.history-dot.import    { background: var(--blue); }
.history-meta {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--text-3);
}
.history-text {
  font-size: 12px;
  color: var(--text-2);
}

/* Confirmation banner (QR form success) */
.confirm-banner {
  background: var(--green-dim);
  border: 1px solid var(--green);
  border-radius: var(--r-sm);
  padding: var(--sp-3) var(--sp-4);
  font-family: var(--font-mono);
  font-size: 12px;
  color: var(--green);
  display: flex;
  align-items: center;
  gap: var(--sp-3);
  animation: slideUp 0.2s ease;
}


/* css/matrix.css */
/* ═══════════════════════════════════════════════════
   SKILLS MATRIX GRID
═══════════════════════════════════════════════════ */

.matrix-container {
  position: relative;
  overflow: auto;
  max-height: calc(100vh - 200px);
  border: 1px solid var(--border);
  border-radius: var(--r);
  background: var(--bg-2);
}

/* Scroll indicators */
.matrix-container::after {
  content: '';
  position: sticky;
  right: 0;
  top: 0;
  display: block;
  pointer-events: none;
}

.matrix-table {
  border-collapse: collapse;
  min-width: 100%;
  table-layout: fixed;
}

/* Sticky corner */
.matrix-table .th-corner {
  position: sticky;
  left: 0;
  top: 0;
  z-index: 30;
  background: var(--bg-2);
  min-width: 160px;
  width: 160px;
  padding: var(--sp-3) var(--sp-4);
  border-right: 1px solid var(--border-2);
  border-bottom: 1px solid var(--border-2);
}

/* Sticky header row (positions) */
.matrix-table th.th-pos {
  position: sticky;
  top: 0;
  z-index: 20;
  background: var(--bg-2);
  border-bottom: 1px solid var(--border-2);
  width: 40px;
  min-width: 40px;
  max-width: 40px;
  padding: 0;
  vertical-align: bottom;
}

.pos-header-wrap {
  display: flex;
  justify-content: center;
  padding: 6px 0 4px;
  height: 120px;
  align-items: flex-end;
}

.pos-header-text {
  writing-mode: vertical-lr;
  transform: rotate(180deg);
  font-family: var(--font-mono);
  font-size: 10px;
  font-weight: 500;
  color: var(--text-2);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-height: 110px;
  cursor: default;
}

.pos-header-text.critical { color: var(--accent); }

/* Sticky roster column */
.matrix-table td.td-roster {
  position: sticky;
  left: 0;
  z-index: 10;
  background: var(--bg-2);
  border-right: 1px solid var(--border-2);
  min-width: 160px;
  width: 160px;
  padding: var(--sp-2) var(--sp-4);
  white-space: nowrap;
}

.matrix-table tbody tr:hover td.td-roster { background: var(--bg-3); }

.emp-name {
  font-size: 12px;
  font-weight: 500;
  color: var(--text);
  display: block;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 140px;
}

.emp-role-badge {
  font-family: var(--font-mono);
  font-size: 8px;
  color: var(--text-3);
  letter-spacing: 0.06em;
  text-transform: uppercase;
}

/* Skill cells */
.matrix-table td.td-skill {
  width: 40px;
  min-width: 40px;
  max-width: 40px;
  padding: var(--sp-2) var(--sp-1);
  text-align: center;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
}

.matrix-table tbody tr:hover td.td-skill { background: var(--bg-3); }

.matrix-table td.td-skill:hover .level-cell {
  transform: scale(1.2);
  z-index: 5;
  position: relative;
}

/* Row separator every N rows (groups) */
.matrix-table tbody tr.row-separator td {
  border-bottom: 2px solid var(--border-2);
}

/* Filter bar above matrix */
.matrix-filter-bar {
  display: flex;
  gap: var(--sp-3);
  align-items: center;
  margin-bottom: var(--sp-4);
  flex-wrap: wrap;
}

.matrix-filter-bar input[type="text"] {
  max-width: 200px;
  font-size: 12px;
  padding: 6px 10px;
}

.matrix-filter-bar select {
  max-width: 160px;
  font-size: 11px;
  padding: 6px 10px;
}

.matrix-scale-info {
  margin-left: auto;
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--text-3);
}

/* Legend */
.matrix-legend {
  display: flex;
  gap: var(--sp-5);
  margin-top: var(--sp-4);
  flex-wrap: wrap;
}

.legend-item {
  display: flex;
  align-items: center;
  gap: var(--sp-2);
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--text-3);
}

/* Print CSS for QR */
@media print {
  .sidebar, .topbar, .app-shell { display: none !important; }
  .qr-print-sheet {
    display: block !important;
    padding: 40px;
    font-family: 'IBM Plex Mono', monospace;
  }
  .qr-print-sheet .qr-line-name {
    font-size: 24px;
    font-weight: 700;
    margin-bottom: 20px;
  }
  .qr-print-sheet .qr-image {
    margin-bottom: 16px;
  }
  .qr-print-sheet .qr-url {
    font-size: 14px;
    margin-bottom: 24px;
    word-break: break-all;
  }
  .qr-print-sheet .qr-instructions-en,
  .qr-print-sheet .qr-instructions-es {
    font-size: 13px;
    margin-bottom: 8px;
  }
}

// ===== js/db/db.js =====
/**
 * DB — IndexedDB wrapper with in-memory fallback.
 *
 * If IndexedDB is unavailable (private mode, file:// restriction, blocked),
 * all operations transparently use an in-memory store for the session.
 * window.__DB_WARN(reason) is called to show a visible banner.
 */
const DB = (() => {
  const NAME    = 'SkillsMatrixDB';
  const VERSION = 3;
  let _db       = null;
  let _memMode  = false;

  /* ── In-memory store ──────────────────────────────────────────── */
  const _mem    = {};
  let   _memSeq = 1;

  const SCHEMA = [
    { name: 'lines',        opts: { keyPath: 'id', autoIncrement: true },  indexes: [] },
    { name: 'employees',    opts: { keyPath: 'id', autoIncrement: true },
      indexes: [
        { name: 'lineId',       kp: 'lineId',                    opts: {} },
        { name: 'role',         kp: 'role',                      opts: {} },
        { name: 'lineRole',     kp: ['lineId','role'],           opts: {} },
        { name: 'lineActive',   kp: ['lineId','active'],         opts: {} },
        { name: 'lineNormName', kp: ['lineId','normalizedName'], opts: { unique: true } },
      ]
    },
    { name: 'positions',    opts: { keyPath: 'id', autoIncrement: true },
      indexes: [
        { name: 'lineId',       kp: 'lineId',                    opts: {} },
        { name: 'lineCritical', kp: ['lineId','critical'],       opts: {} },
        { name: 'lineNormName', kp: ['lineId','normalizedName'], opts: { unique: true } },
      ]
    },
    { name: 'skillRecords', opts: { keyPath: 'id', autoIncrement: true },
      indexes: [
        { name: 'lineId',     kp: 'lineId',                      opts: {} },
        { name: 'employeeId', kp: 'employeeId',                  opts: {} },
        { name: 'positionId', kp: 'positionId',                  opts: {} },
        { name: 'empPos',     kp: ['employeeId','positionId'],   opts: { unique: true } },
      ]
    },
    { name: 'trainingLogs', opts: { keyPath: 'id', autoIncrement: true },
      indexes: [
        { name: 'lineId',             kp: 'lineId',                      opts: {} },
        { name: 'employeeId',         kp: 'employeeId',                  opts: {} },
        { name: 'positionId',         kp: 'positionId',                  opts: {} },
        { name: 'timestamp',          kp: 'timestamp',                   opts: {} },
        { name: 'lineTimestamp',      kp: ['lineId','timestamp'],        opts: {} },
        { name: 'lineServerReceived', kp: ['lineId','serverReceivedAt'], opts: {} },
        { name: 'syncedToAuthority',  kp: 'syncedToAuthority',          opts: {} },
        { name: 'clientId',           kp: 'clientId',                    opts: { unique: true } },
        { name: 'employeeResolved',   kp: 'employeeResolved',            opts: {} },
      ]
    },
    { name: 'attendance',   opts: { keyPath: 'id', autoIncrement: true },
      indexes: [
        { name: 'lineId',     kp: 'lineId',              opts: {} },
        { name: 'employeeId', kp: 'employeeId',          opts: {} },
        { name: 'date',       kp: 'date',                opts: {} },
        { name: 'empDate',    kp: ['employeeId','date'], opts: { unique: true } },
        { name: 'lineDate',   kp: ['lineId','date'],     opts: {} },
      ]
    },
    { name: 'rotationPlans', opts: { keyPath: 'id', autoIncrement: true },
      indexes: [
        { name: 'lineId',   kp: 'lineId',          opts: {} },
        { name: 'date',     kp: 'date',             opts: {} },
        { name: 'lineDate', kp: ['lineId','date'],  opts: {} },
      ]
    },
    { name: 'auditLogs',    opts: { keyPath: 'id', autoIncrement: true },
      indexes: [
        { name: 'lineId',       kp: 'lineId',                  opts: {} },
        { name: 'positionId',   kp: 'positionId',              opts: {} },
        { name: 'supervisorId', kp: 'supervisorId',            opts: {} },
        { name: 'date',         kp: 'date',                    opts: {} },
        { name: 'supDate',      kp: ['supervisorId','date'],   opts: {} },
        { name: 'lineSuper',    kp: ['lineId','supervisorId'], opts: {} },
      ]
    },
    { name: 'templateMappings', opts: { keyPath: 'id', autoIncrement: true },
      indexes: [
        { name: 'lineId', kp: 'lineId', opts: { unique: true } },
      ]
    },
    { name: 'pendingRecommendations', opts: { keyPath: 'id', autoIncrement: true },
      indexes: [
        { name: 'lineId',            kp: 'lineId',                    opts: {} },
        { name: 'employeeId',        kp: 'employeeId',                opts: {} },
        { name: 'positionId',        kp: 'positionId',                opts: {} },
        { name: 'status',            kp: 'status',                    opts: {} },
        { name: 'lineStatus',        kp: ['lineId','status'],         opts: {} },
        { name: 'empPos',            kp: ['employeeId','positionId'], opts: {} },
        { name: 'clientId',          kp: 'clientId',                  opts: { unique: true } },
        { name: 'syncedToAuthority', kp: 'syncedToAuthority',        opts: {} },
      ]
    },
    { name: 'users',    opts: { keyPath: 'id', autoIncrement: true },
      indexes: [
        { name: 'role',   kp: 'role',   opts: {} },
        { name: 'active', kp: 'active', opts: {} },
      ]
    },
    { name: 'devices',  opts: { keyPath: 'id' },
      indexes: [
        { name: 'role',   kp: 'role',   opts: {} },
        { name: 'lineId', kp: 'lineId', opts: {} },
      ]
    },
    { name: 'appSettings', opts: { keyPath: 'key' }, indexes: [] },
  ];

  // Index definitions for memory-mode queries
  const _indexDefs = {};
  SCHEMA.forEach(s => {
    _indexDefs[s.name] = {};
    (s.indexes || []).forEach(idx => { _indexDefs[s.name][idx.name] = idx.kp; });
  });

  /* ── open() with 3s timeout and in-memory fallback ───────────── */
  function open() {
    if (_memMode)              return Promise.resolve(null);
    if (_db)                   return Promise.resolve(_db);
    if (!window.indexedDB)     return _toMemory('IndexedDB not supported in this browser/mode');

    return new Promise((resolve, reject) => {
      let done = false;
      function settle(val, err) {
        if (done) return; done = true;
        clearTimeout(timer);
        if (err) reject(err); else resolve(val);
      }

      const timer = setTimeout(() =>
        settle(null, new Error('IndexedDB open timed out (3 s) — may be blocked or corrupted')),
        3000
      );

      let req;
      try { req = indexedDB.open(NAME, VERSION); }
      catch(e) { settle(null, e); return; }

      req.onblocked = () =>
        settle(null, new Error('IndexedDB blocked — close other tabs with this app open'));

      req.onupgradeneeded = e => {
        try {
          const d  = e.target.result;
          const tx = e.target.transaction;
          SCHEMA.forEach(s => {
            let store;
            if (!d.objectStoreNames.contains(s.name)) {
              store = d.createObjectStore(s.name, s.opts);
            } else {
              store = tx.objectStore(s.name);
            }
            (s.indexes || []).forEach(idx => {
              if (!store.indexNames.contains(idx.name)) {
                try { store.createIndex(idx.name, idx.kp, idx.opts); }
                catch(ie) { console.warn('[DB] index:', idx.name, ie.message); }
              }
            });
          });
        } catch(ue) { settle(null, ue); }
      };

      req.onsuccess = e => { _db = e.target.result; settle(_db); };
      req.onerror   = e => settle(null, e.target.error);
    }).catch(err => {
      console.warn('[DB] Falling back to memory mode:', err.message);
      return _toMemory(err.message);
    });
  }

  function _toMemory(reason) {
    _memMode = true; _db = null;
    if (typeof window.__DB_WARN === 'function') window.__DB_WARN(reason);
    return Promise.resolve(null);
  }

  /* ── Memory helpers ──────────────────────────────────────────── */
  function _kp(storeName) {
    const s = SCHEMA.find(x => x.name === storeName);
    return s ? s.opts.keyPath : 'id';
  }
  function _mmap(n) { if (!_mem[n]) _mem[n] = new Map(); return _mem[n]; }

  function _mGet(sn, key) {
    const k = _kp(sn) === 'key' ? String(key) : Number(key);
    return _mmap(sn).get(k);
  }
  function _mGetAll(sn) { return Array.from(_mmap(sn).values()); }

  function _mMatch(sn, indexName, query) {
    const kp  = _indexDefs[sn]?.[indexName];
    if (!kp) return [];
    return _mGetAll(sn).filter(rec => {
      const rv = Array.isArray(kp) ? kp.map(k => rec[k]) : rec[kp];
      if (query == null) return true;
      // IDBKeyRange.only(x) has lower===upper===x
      const cmp = (query && typeof query === 'object' && 'lower' in query)
        ? query.lower : query;
      if (Array.isArray(cmp) && Array.isArray(rv))
        return cmp.every((v, i) => String(rv[i]) === String(v));
      if (Array.isArray(rv))
        return String(rv) === String(cmp);
      return rv === cmp || String(rv) === String(cmp);
    });
  }

  function _mPut(sn, data) {
    const k = _kp(sn);
    if (k === 'key') { _mmap(sn).set(String(data[k]), data); return data[k]; }
    const id = (data[k] != null) ? Number(data[k]) : _memSeq++;
    const rec = { ...data, [k]: id };
    _mmap(sn).set(id, rec);
    return id;
  }

  function _mAdd(sn, data) {
    const k = _kp(sn);
    if (k === 'key') { _mmap(sn).set(String(data[k]), data); return data[k]; }
    if (data[k] != null && _mmap(sn).has(Number(data[k]))) {
      const e = new Error('ConstraintError'); e.name = 'ConstraintError'; throw e;
    }
    return _mPut(sn, data);
  }

  /* ── Public API ──────────────────────────────────────────────── */
  function get(sn, key) {
    return open().then(() =>
      _memMode ? _mGet(sn, key) :
      new Promise((res, rej) => {
        const r = _db.transaction(sn).objectStore(sn).get(key);
        r.onsuccess = e => res(e.target.result);
        r.onerror   = e => rej(e.target.error);
      })
    );
  }

  function getAll(sn) {
    return open().then(() =>
      _memMode ? _mGetAll(sn) :
      new Promise((res, rej) => {
        const r = _db.transaction(sn).objectStore(sn).getAll();
        r.onsuccess = e => res(e.target.result);
        r.onerror   = e => rej(e.target.error);
      })
    );
  }

  function getAllByIndex(sn, idx, query) {
    return open().then(() =>
      _memMode ? _mMatch(sn, idx, query) :
      new Promise((res, rej) => {
        const r = _db.transaction(sn).objectStore(sn).index(idx).getAll(query);
        r.onsuccess = e => res(e.target.result);
        r.onerror   = e => rej(e.target.error);
      })
    );
  }

  function getByIndex(sn, idx, query) {
    return open().then(() =>
      _memMode ? (_mMatch(sn, idx, query)[0] ?? undefined) :
      new Promise((res, rej) => {
        const r = _db.transaction(sn).objectStore(sn).index(idx).get(query);
        r.onsuccess = e => res(e.target.result);
        r.onerror   = e => rej(e.target.error);
      })
    );
  }

  function put(sn, data) {
    return open().then(() =>
      _memMode ? _mPut(sn, data) :
      new Promise((res, rej) => {
        const r = _db.transaction(sn, 'readwrite').objectStore(sn).put(data);
        r.onsuccess = e => res(e.target.result);
        r.onerror   = e => rej(e.target.error);
      })
    );
  }

  function add(sn, data) {
    return open().then(() =>
      _memMode ? _mAdd(sn, data) :
      new Promise((res, rej) => {
        const r = _db.transaction(sn, 'readwrite').objectStore(sn).add(data);
        r.onsuccess = e => res(e.target.result);
        r.onerror   = e => rej(e.target.error);
      })
    );
  }

  function remove(sn, key) {
    return open().then(() => {
      if (_memMode) { _mmap(sn).delete(Number(key)); return; }
      return new Promise((res, rej) => {
        const r = _db.transaction(sn, 'readwrite').objectStore(sn).delete(key);
        r.onsuccess = e => res(e.target.result);
        r.onerror   = e => rej(e.target.error);
      });
    });
  }

  function clear(sn) {
    return open().then(() => {
      if (_memMode) { _mmap(sn).clear(); return; }
      return new Promise((res, rej) => {
        const r = _db.transaction(sn, 'readwrite').objectStore(sn).clear();
        r.onsuccess = e => res(e.target.result);
        r.onerror   = e => rej(e.target.error);
      });
    });
  }

  async function getSetting(key, defaultVal = null) {
    const rec = await get('appSettings', key);
    return (rec !== undefined && rec !== null) ? rec.value : defaultVal;
  }

  function setSetting(key, value) {
    return put('appSettings', { key, value });
  }

  async function upsertAttendance(data) {
    if (_memMode) {
      const ex = _mMatch('attendance', 'empDate', [data.employeeId, data.date])[0];
      return ex ? _mPut('attendance', { ...data, id: ex.id }) : _mAdd('attendance', data);
    }
    await open();
    return new Promise((res, rej) => {
      const tx   = _db.transaction('attendance', 'readwrite');
      const st   = tx.objectStore('attendance');
      const find = st.index('empDate').getKey(IDBKeyRange.only([data.employeeId, data.date]));
      find.onsuccess = e => {
        const eid = e.target.result;
        const rec = eid !== undefined ? { ...data, id: eid } : data;
        const pr  = st.put(rec);
        pr.onsuccess = ev => res(ev.target.result);
        pr.onerror   = ev => rej(ev.target.error);
      };
      find.onerror = e => rej(e.target.error);
    });
  }

  async function batchUpsertAttendance(records) {
    if (_memMode) { for (const r of records) await upsertAttendance(r); return records; }
    await open();
    return new Promise((res, rej) => {
      const tx   = _db.transaction('attendance', 'readwrite');
      const st   = tx.objectStore('attendance');
      const idx  = st.index('empDate');
      const out  = [];
      records.forEach(data => {
        const find = idx.getKey(IDBKeyRange.only([data.employeeId, data.date]));
        find.onsuccess = e => {
          const eid = e.target.result;
          const rec = eid !== undefined ? { ...data, id: eid } : data;
          st.put(rec).onsuccess = ev => out.push(ev.target.result);
        };
      });
      tx.oncomplete = () => res(out);
      tx.onerror    = e  => rej(e.target.error);
    });
  }

  async function upsertByIndex(sn, indexName, keyValue, data) {
    if (_memMode) {
      const ex = _mMatch(sn, indexName, keyValue)[0];
      if (ex) return _mPut(sn, { ...data, [_kp(sn)]: ex[_kp(sn)] });
      return _mAdd(sn, data);
    }
    await open();
    return new Promise((res, rej) => {
      const tx    = _db.transaction(sn, 'readwrite');
      const st    = tx.objectStore(sn);
      const query = Array.isArray(keyValue) ? IDBKeyRange.only(keyValue) : keyValue;
      const find  = st.index(indexName).getKey(query);
      find.onsuccess = e => {
        const eid = e.target.result;
        const rec = eid !== undefined ? { ...data, id: eid } : data;
        const pr  = st.put(rec);
        pr.onsuccess = ev => res(ev.target.result);
        pr.onerror   = ev => rej(ev.target.error);
      };
      find.onerror = e => rej(e.target.error);
    });
  }

  function dropDatabase() {
    if (_memMode) { Object.keys(_mem).forEach(k => delete _mem[k]); return Promise.resolve(); }
    return new Promise((res, rej) => {
      if (_db) { _db.close(); _db = null; }
      const req = indexedDB.deleteDatabase(NAME);
      req.onsuccess = () => res();
      req.onerror   = e => rej(e.target.error);
    });
  }

  return {
    open, get, getAll, getAllByIndex, getByIndex, put, add, remove, clear,
    getSetting, setSetting, upsertAttendance, batchUpsertAttendance,
    upsertByIndex, dropDatabase, NAME,
    get isMemoryMode() { return _memMode; }
  };
})();


// ===== js/domain/skillSM.js =====
/**
 * skillSM — Pure skill level state machine. No DB, no DOM, no side effects.
 */
const skillSM = (() => {

  function blank(employeeId, positionId) {
    return {
      employeeId, positionId,
      currentLevel: 0, requestedLevel: null,
      status: 'approved',
      approvals: [], history: []
    };
  }

  function fromImport(employeeId, positionId, level) {
    const rec = blank(employeeId, positionId);
    rec.currentLevel = level;
    if (level > 0) {
      rec.history = [{ fromLevel: 0, toLevel: level, by: 'Excel Import', role: 'import', at: Date.now(), type: 'import' }];
    }
    return rec;
  }

  function isQualified(record) {
    if (!record) return false;
    return record.status === 'approved' && record.currentLevel >= 3;
  }

  function countsFor3x3(record) { return isQualified(record); }

  function addPromotion(record, approverName, approverRole, comment) {
    if (!approverName || !approverName.trim()) return { ok: false, error: 'err_no_name' };
    if (record.currentLevel >= 4) return { ok: false, error: 'err_max_level' };

    const targetLevel = record.currentLevel + 1;
    const needsDual = targetLevel >= 3;
    const now = Date.now();

    if (!needsDual) {
      // Single signature
      const newRec = _deepClone(record);
      newRec.currentLevel = targetLevel;
      newRec.requestedLevel = null;
      newRec.status = 'approved';
      newRec.approvals = [{ approverName, role: approverRole, timestamp: now, comment: comment || '', forLevel: targetLevel }];
      newRec.history = [...record.history, { fromLevel: record.currentLevel, toLevel: targetLevel, by: approverName, role: approverRole, at: now, type: 'promotion' }];
      return { ok: true, newRecord: newRec, promoted: true, pendingDual: false };
    }

    // Dual signature required
    if (record.status !== 'pending_dual') {
      // First signature
      const newRec = _deepClone(record);
      newRec.requestedLevel = targetLevel;
      newRec.status = 'pending_dual';
      newRec.approvals = [{ approverName, role: approverRole, timestamp: now, comment: comment || '', forLevel: targetLevel }];
      return { ok: true, newRecord: newRec, promoted: false, pendingDual: true };
    }

    // Second signature
    const firstApprover = record.approvals[0];
    if (firstApprover && firstApprover.approverName === approverName.trim()) {
      return { ok: false, error: 'err_same_person' };
    }
    const roles = [firstApprover?.role, approverRole];
    if (!roles.includes('supervisor')) {
      return { ok: false, error: 'err_need_supervisor' };
    }

    const newRec = _deepClone(record);
    newRec.currentLevel = targetLevel;
    newRec.requestedLevel = null;
    newRec.status = 'approved';
    newRec.approvals = [
      ...record.approvals,
      { approverName, role: approverRole, timestamp: now, comment: comment || '', forLevel: targetLevel }
    ];
    newRec.history = [...record.history, { fromLevel: record.currentLevel, toLevel: targetLevel, by: approverName, role: approverRole, at: now, type: 'promotion' }];
    return { ok: true, newRecord: newRec, promoted: true, pendingDual: false };
  }

  function demote(record, supervisorName, targetLevel, reason) {
    if (!supervisorName || !supervisorName.trim()) return { ok: false, error: 'err_no_name' };
    if (!reason || !reason.trim()) return { ok: false, error: 'err_reason_required' };
    if (targetLevel >= record.currentLevel) return { ok: false, error: 'err_reason_required' };

    const newRec = _deepClone(record);
    newRec.currentLevel = targetLevel;
    newRec.requestedLevel = null;
    newRec.status = 'approved';
    newRec.approvals = [];
    newRec.history = [...record.history, {
      fromLevel: record.currentLevel, toLevel: targetLevel,
      by: supervisorName, role: 'supervisor', at: Date.now(),
      reason: reason.trim(), type: 'demotion'
    }];
    return { ok: true, newRecord: newRec };
  }

  function _deepClone(obj) { return JSON.parse(JSON.stringify(obj)); }

  return { blank, fromImport, isQualified, countsFor3x3, addPromotion, demote };
})();


// ===== js/domain/rotation.js =====
/**
 * rotation — Pure rotation plan generator. No DB, no DOM.
 */
const rotation = (() => {

  function generate({ presentEmployees, positions, qualifiedSet, l2Set, yesterdayPlan, bbMode }) {
    const slots = [], violations = [], gaps = [];
    const periods = ['A', 'B', 'C'];

    // Track per-employee assignment counts today
    const todayCount = {};       // empId -> total assignments
    const todayPositions = {};   // empId -> Set of positionIds assigned today

    presentEmployees.forEach(e => {
      todayCount[e.id] = 0;
      todayPositions[e.id] = new Set();
    });

    // Build yesterday's last assignment map for tie-breaking
    const yesterdayMap = {}; // empId -> positionId
    if (yesterdayPlan && yesterdayPlan.slots) {
      yesterdayPlan.slots.forEach(s => { yesterdayMap[s.employeeId] = s.positionId; });
    }

    periods.forEach(period => {
      const periodUsed = new Set(); // empIds used this period

      positions.forEach(pos => {
        const key = (empId) => `${empId}_${pos.id}`;

        // Pool1: qualified, not in period, not assigned this pos today
        const pool1 = presentEmployees.filter(e =>
          qualifiedSet.has(key(e.id)) &&
          !periodUsed.has(e.id) &&
          !todayPositions[e.id]?.has(pos.id)
        );

        // Pool2: qualified, not in period, but WAS assigned this pos today
        const pool2 = presentEmployees.filter(e =>
          qualifiedSet.has(key(e.id)) &&
          !periodUsed.has(e.id) &&
          todayPositions[e.id]?.has(pos.id)
        );

        // Pool3: qualified, already in period (double assign)
        const pool3 = presentEmployees.filter(e =>
          qualifiedSet.has(key(e.id)) && periodUsed.has(e.id)
        );

        // Pool4: L2, not in period
        const pool4 = presentEmployees.filter(e =>
          l2Set.has(key(e.id)) && !periodUsed.has(e.id)
        );

        let chosen = null, violationReason = null;

        if (pool1.length) {
          chosen = _tieBreak(pool1, todayCount, yesterdayMap, pos.id);
        } else if (pool2.length) {
          chosen = _tieBreak(pool2, todayCount, yesterdayMap, pos.id);
          violationReason = 'violation_repeat';
        } else if (pool3.length) {
          chosen = _tieBreak(pool3, todayCount, yesterdayMap, pos.id);
          violationReason = 'violation_double';
        } else if (pool4.length) {
          chosen = _tieBreak(pool4, todayCount, yesterdayMap, pos.id);
          violationReason = 'violation_underqualified';
        }

        if (chosen) {
          slots.push({ period, employeeId: chosen.id, employeeName: chosen.name, positionId: pos.id, positionName: pos.name, violation: !!violationReason, violationReason });
          if (violationReason) violations.push({ period, positionId: pos.id, positionName: pos.name, employeeId: chosen.id, reason: violationReason });
          periodUsed.add(chosen.id);
          todayCount[chosen.id] = (todayCount[chosen.id] || 0) + 1;
          if (!todayPositions[chosen.id]) todayPositions[chosen.id] = new Set();
          todayPositions[chosen.id].add(pos.id);
        } else {
          gaps.push({ period, positionId: pos.id, positionName: pos.name });
        }
      });
    });

    // Suggestions: positions with violations or gaps
    const urgencyMap = {};
    [...violations, ...gaps].forEach(v => {
      urgencyMap[v.positionId] = (urgencyMap[v.positionId] || 0) + 1;
    });

    const suggestions = Object.entries(urgencyMap)
      .map(([posId, urgencyScore]) => {
        const pos = positions.find(p => p.id == posId);
        if (!pos) return null;
        const currentL3Count = presentEmployees.filter(e => qualifiedSet.has(`${e.id}_${posId}`)).length;
        const candidates = presentEmployees
          .filter(e => {
            const k = `${e.id}_${posId}`;
            return !qualifiedSet.has(k); // not yet L3+
          })
          .map(e => {
            const k = `${e.id}_${posId}`;
            const level = l2Set.has(k) ? 2 : 0;
            return { employeeId: e.id, name: e.name, currentLevel: level };
          })
          .sort((a, b) => b.currentLevel - a.currentLevel)
          .slice(0, 5);
        return { positionId: pos.id, positionName: pos.name, urgencyScore, currentL3Count, candidates };
      })
      .filter(Boolean)
      .sort((a, b) => b.urgencyScore - a.urgencyScore || a.currentL3Count - b.currentL3Count);

    return { slots, violations, gaps, suggestions };
  }

  function _tieBreak(pool, todayCount, yesterdayMap, positionId) {
    return pool.slice().sort((a, b) => {
      const ca = todayCount[a.id] || 0, cb = todayCount[b.id] || 0;
      if (ca !== cb) return ca - cb;
      // Prefer employee whose yesterday assignment was NOT this position
      const ya = yesterdayMap[a.id] === positionId ? 1 : 0;
      const yb = yesterdayMap[b.id] === positionId ? 1 : 0;
      return ya - yb;
    })[0];
  }

  return { generate };
})();


// ===== js/domain/analysis.js =====
/**
 * crossTraining — Pure 3×3 analysis. No DB, no DOM.
 */
const crossTraining = (() => {
  function analyze(employees, positions, skillRecords) {
    // Build lookup: "empId_posId" -> record
    const map = {};
    skillRecords.forEach(r => { map[`${r.employeeId}_${r.positionId}`] = r; });

    const isQ = (empId, posId) => {
      const r = map[`${empId}_${posId}`];
      return r && r.status === 'approved' && r.currentLevel >= 3;
    };

    const activeEmps = employees.filter(e => e.active !== false);

    // Position status
    const positionStatus = positions.map(pos => {
      const qualified = activeEmps.filter(e => isQ(e.id, pos.id));
      const count = qualified.length;
      return {
        id: pos.id, name: pos.name, critical: pos.critical, count,
        status: count >= 3 ? 'met' : count > 0 ? 'partial' : 'critical',
        qualifiedEmployeeIds: qualified.map(e => e.id)
      };
    });

    // Employee status
    const employeeStatus = activeEmps.map(emp => {
      const qualified = positions.filter(pos => isQ(emp.id, pos.id));
      const count = qualified.length;
      return {
        id: emp.id, name: emp.name, count,
        status: count >= 3 ? 'met' : count > 0 ? 'partial' : 'critical',
        qualifiedPositionIds: qualified.map(p => p.id)
      };
    });

    // Recommendations: positions not yet at 3, sorted by count asc
    const recommendations = positionStatus
      .filter(p => p.count < 3)
      .sort((a, b) => a.count - b.count || (b.critical ? 1 : 0) - (a.critical ? 1 : 0))
      .map(ps => {
        const candidates = activeEmps
          .filter(e => !isQ(e.id, ps.id))
          .map(e => {
            const r = map[`${e.id}_${ps.id}`];
            return { employeeId: e.id, name: e.name, currentLevel: r ? r.currentLevel : 0, status: r ? r.status : 'none' };
          })
          .sort((a, b) => b.currentLevel - a.currentLevel)
          .slice(0, 5);
        return { positionId: ps.id, positionName: ps.name, critical: ps.critical, need: 3 - ps.count, currentL3Count: ps.count, candidates };
      });

    const summary = {
      positionsMet:      positionStatus.filter(p => p.status === 'met').length,
      positionsPartial:  positionStatus.filter(p => p.status === 'partial').length,
      positionsCritical: positionStatus.filter(p => p.status === 'critical').length,
      employeesMet:      employeeStatus.filter(e => e.status === 'met').length,
      employeesPartial:  employeeStatus.filter(e => e.status === 'partial').length,
      employeesCritical: employeeStatus.filter(e => e.status === 'critical').length,
      totalSlots: employees.length * positions.length,
      filledSlots: skillRecords.filter(r => r.currentLevel > 0).length,
    };
    summary.fillRate = summary.totalSlots ? summary.filledSlots / summary.totalSlots : 0;

    return { positionStatus, employeeStatus, recommendations, summary };
  }

  return { analyze };
})();

/**
 * auditScheduler — Pure audit selection logic. No DB, no DOM.
 */
const auditScheduler = (() => {
  function selectAudit({ positions, auditHistory, today }) {
    if (!positions || !positions.length) return null;

    // Only count audits where result is not null (completed)
    const auditedSet = new Set(auditHistory.filter(a => a.result !== null).map(a => a.positionId));
    let pool = positions.filter(p => !auditedSet.has(p.id));
    let cycleReset = false;

    if (!pool.length) {
      cycleReset = true;
      pool = [...positions];
    }

    const selected = pool[Math.floor(Math.random() * pool.length)];
    return { positionId: selected.id, positionName: selected.name, cycleReset };
  }

  function getTodaysAudit(auditLogs, supervisorId, today) {
    return auditLogs.find(a => a.supervisorId === supervisorId && a.date === today) || null;
  }

  return { selectAudit, getTodaysAudit };
})();

/**
 * templateMapper — Pure Excel template detection. No DB, no DOM.
 * Requires SheetJS (window.XLSX) to be loaded.
 */
const templateMapper = (() => {

  const ROSTER_ANCHORS = ['team member','employee','nombre','empleado','roster','name','operador','operator'];
  const HEADER_ANCHORS = ['position','job','puesto','estación','estacion','station','operation','operacion'];
  const TITLE_ANCHORS  = ['skills matrix','matriz de habilidades'];
  const NAME_RE = /^[A-Za-zÀ-ÿ]{2,}(\s[A-Za-zÀ-ÿ\.\-]{1,})+$/;

  function detectMapping(workbook, options = {}) {
    const minPositions = options.minPositions || 5;
    const minRoster    = options.minRoster    || 5;
    const minRatio     = options.minRatio     || 0.70;

    // Phase 1: Named Ranges
    const p1 = _tryNamedRanges(workbook);
    if (p1) {
      const ws = workbook.Sheets[p1.sheet];
      const validation = _validate(ws, p1, minPositions, minRoster, minRatio);
      return { ...p1, ...validation };
    }

    // Select best sheet
    const sheetName = _selectSheet(workbook);
    const ws = workbook.Sheets[sheetName];
    if (!ws) return { valid: false, errors: ['No valid sheet found'], method: 'unknown' };

    // Phase 2: Keyword anchors
    const p2 = _tryKeywords(ws, sheetName);
    if (p2) {
      const validation = _validate(ws, p2, minPositions, minRoster, minRatio);
      if (validation.valid) return { ...p2, ...validation };
      // Fall through to structural but keep p2 if structural also fails
    }

    // Phase 3: Structural
    const p3 = _tryStructural(ws, sheetName);
    const base = p3 || p2 || { sheet: sheetName, headerRow: 0, rosterCol: 0, firstPositionCol: 1, firstRosterRow: 1, method: 'structural' };
    const validation = _validate(ws, base, minPositions, minRoster, minRatio);
    return { ...base, ...validation };
  }

  function _tryNamedRanges(wb) {
    const names = wb.Workbook && wb.Workbook.Names;
    if (!names) return null;
    const find = (n) => names.find(x => x.Name.toLowerCase() === n.toLowerCase());
    const ms = find('Matrix_Start');
    const rs = find('Roster_Start');
    const hr = find('Header_Row');
    const fp = find('First_Position_Col');
    if (!ms || !rs || !hr || !fp) return null;
    try {
      const sheet = ms.Ref.split('!')[0].replace(/'/g, '');
      const headerRow = parseInt(hr.Ref.match(/\d+/)[0]) - 1;
      const rosterCol = XLSX.utils.decode_col(rs.Ref.match(/[A-Z]+/)[0]);
      const firstPositionCol = XLSX.utils.decode_col(fp.Ref.match(/[A-Z]+/)[0]);
      const firstRosterRow = XLSX.utils.decode_row(ms.Ref.match(/\d+/)[0]) ;
      return { sheet, headerRow, rosterCol, firstPositionCol, firstRosterRow, method: 'named_ranges' };
    } catch(e) { return null; }
  }

  function _selectSheet(wb) {
    let best = wb.SheetNames[0], bestScore = -1;
    wb.SheetNames.forEach(name => {
      const ws = wb.Sheets[name];
      let score = 0;
      const range = XLSX.utils.decode_range(ws['!ref'] || 'A1:A1');
      for (let r = 0; r <= Math.min(39, range.e.r); r++) {
        for (let c = 0; c <= Math.min(15, range.e.c); c++) {
          const cell = ws[XLSX.utils.encode_cell({ r, c })];
          if (!cell || !cell.v) continue;
          const v = String(cell.v).toLowerCase().trim();
          if ([...ROSTER_ANCHORS, ...HEADER_ANCHORS, ...TITLE_ANCHORS].some(a => v.includes(a))) score += 10;
        }
      }
      if (score > bestScore) { bestScore = score; best = name; }
    });
    return best;
  }

  function _tryKeywords(ws, sheetName) {
    const range = XLSX.utils.decode_range(ws['!ref'] || 'A1:A1');
    let headerRow = -1, rosterCol = -1, hScore = -1, rScore = -1;

    for (let r = 0; r <= Math.min(39, range.e.r); r++) {
      let rowScore = 0, nameCount = 0;
      for (let c = 0; c <= Math.min(15, range.e.c); c++) {
        const cell = ws[XLSX.utils.encode_cell({ r, c })];
        if (!cell || !cell.v) continue;
        const v = String(cell.v).toLowerCase().trim();
        HEADER_ANCHORS.forEach(a => { if (v.includes(a)) rowScore += 5; });
        ROSTER_ANCHORS.forEach(a => { if (v.includes(a)) rowScore += 8; });
        if (NAME_RE.test(String(cell.v).trim())) nameCount++;
      }
      if (rowScore > hScore) { hScore = rowScore; headerRow = r; }
    }
    if (headerRow < 0) return null;

    // Find roster col: most name-pattern matches in rows below header
    for (let c = 0; c <= Math.min(10, range.e.c); c++) {
      let score = 0;
      for (let r = headerRow + 1; r <= Math.min(headerRow + 40, range.e.r); r++) {
        const cell = ws[XLSX.utils.encode_cell({ r, c })];
        if (cell && cell.v && NAME_RE.test(String(cell.v).trim())) score++;
      }
      if (score > rScore) { rScore = score; rosterCol = c; }
    }
    if (rosterCol < 0) return null;

    // First position col: first non-empty text cell right of roster in header row
    let firstPositionCol = rosterCol + 1;
    for (let c = rosterCol + 1; c <= range.e.c; c++) {
      const cell = ws[XLSX.utils.encode_cell({ r: headerRow, c })];
      if (cell && cell.v && typeof cell.v === 'string' && cell.v.trim()) { firstPositionCol = c; break; }
    }

    // First roster row
    let firstRosterRow = headerRow + 1;
    for (let r = headerRow + 1; r <= Math.min(headerRow + 10, range.e.r); r++) {
      const cell = ws[XLSX.utils.encode_cell({ r, c: rosterCol })];
      if (cell && cell.v && String(cell.v).trim().length >= 2) { firstRosterRow = r; break; }
    }

    return { sheet: sheetName, headerRow, rosterCol, firstPositionCol, firstRosterRow, method: 'keyword' };
  }

  function _tryStructural(ws, sheetName) {
    const range = XLSX.utils.decode_range(ws['!ref'] || 'A1:A1');
    let headerRow = 0, bestTextCount = -1;

    for (let r = 0; r <= Math.min(29, range.e.r); r++) {
      let total = 0, textCount = 0;
      for (let c = 0; c <= Math.min(range.e.c, 30); c++) {
        const cell = ws[XLSX.utils.encode_cell({ r, c })];
        if (!cell || !cell.v) continue;
        total++;
        if (typeof cell.v === 'string') textCount++;
      }
      if (total > 3 && textCount / total >= 0.5 && textCount > bestTextCount) {
        bestTextCount = textCount; headerRow = r;
      }
    }

    let rosterCol = 0, bestNames = -1;
    for (let c = 0; c <= Math.min(9, range.e.c); c++) {
      let names = 0;
      for (let r = headerRow + 1; r <= Math.min(headerRow + 40, range.e.r); r++) {
        const cell = ws[XLSX.utils.encode_cell({ r, c })];
        if (cell && cell.v && NAME_RE.test(String(cell.v).trim())) names++;
      }
      if (names > bestNames) { bestNames = names; rosterCol = c; }
    }

    let firstPositionCol = rosterCol + 1;
    for (let c = rosterCol + 1; c <= range.e.c; c++) {
      const cell = ws[XLSX.utils.encode_cell({ r: headerRow, c })];
      if (cell && cell.v && String(cell.v).trim()) { firstPositionCol = c; break; }
    }

    return { sheet: sheetName, headerRow, rosterCol, firstPositionCol, firstRosterRow: headerRow + 1, method: 'structural' };
  }

  function _validate(ws, mapping, minPositions, minRoster, minRatio) {
    if (!ws) return { valid: false, errors: ['Worksheet not found'], positionHeaders: 0, rosterEntries: 0, skillRatio: 0 };
    const { headerRow, rosterCol, firstPositionCol, firstRosterRow } = mapping;
    const range = XLSX.utils.decode_range(ws['!ref'] || 'A1:A1');

    // Count positions
    let positionHeaders = 0, lastPosCol = firstPositionCol;
    let consecutive = 0;
    for (let c = firstPositionCol; c <= range.e.c && consecutive < 3; c++) {
      const cell = ws[XLSX.utils.encode_cell({ r: headerRow, c })];
      if (cell && cell.v && String(cell.v).trim()) { positionHeaders++; consecutive = 0; lastPosCol = c; }
      else consecutive++;
    }

    // Count roster entries
    let rosterEntries = 0;
    consecutive = 0;
    for (let r = firstRosterRow; r <= range.e.r && consecutive < 3; r++) {
      const cell = ws[XLSX.utils.encode_cell({ r, c: rosterCol })];
      if (cell && cell.v && String(cell.v).trim().length >= 2) { rosterEntries++; consecutive = 0; }
      else consecutive++;
    }

    // Skill ratio
    let total = 0, valid = 0;
    for (let r = firstRosterRow; r <= Math.min(firstRosterRow + rosterEntries, range.e.r); r++) {
      for (let c = firstPositionCol; c <= lastPosCol; c++) {
        const cell = ws[XLSX.utils.encode_cell({ r, c })];
        if (!cell || !cell.v) { valid++; total++; continue; }
        total++;
        const n = Number(cell.v);
        if (!isNaN(n) && n >= 0 && n <= 4) valid++;
      }
    }
    const skillRatio = total > 0 ? valid / total : 1;

    const errors = [];
    if (positionHeaders < minPositions) errors.push(`Only ${positionHeaders} position headers found (need ${minPositions}+)`);
    if (rosterEntries < minRoster)      errors.push(`Only ${rosterEntries} roster entries found (need ${minRoster}+)`);
    if (skillRatio < minRatio)          errors.push(`Skill area ratio ${Math.round(skillRatio*100)}% (need ${Math.round(minRatio*100)}%+)`);

    return { valid: errors.length === 0, errors, positionHeaders, rosterEntries, skillRatio };
  }

  function extractData(ws, mapping) {
    const { headerRow, rosterCol, firstPositionCol, firstRosterRow } = mapping;
    const range = XLSX.utils.decode_range(ws['!ref'] || 'A1:A1');

    const positions = [];
    let consecutive = 0;
    for (let c = firstPositionCol; c <= range.e.c && consecutive < 3; c++) {
      const cell = ws[XLSX.utils.encode_cell({ r: headerRow, c })];
      if (cell && cell.v && String(cell.v).trim()) {
        positions.push({ col: c, name: String(cell.v).trim() });
        consecutive = 0;
      } else consecutive++;
    }

    const employees = [];
    consecutive = 0;
    for (let r = firstRosterRow; r <= range.e.r && consecutive < 3; r++) {
      const cell = ws[XLSX.utils.encode_cell({ r, c: rosterCol })];
      if (cell && cell.v && String(cell.v).trim().length >= 2) {
        employees.push({ row: r, name: String(cell.v).trim() });
        consecutive = 0;
      } else consecutive++;
    }

    const skills = [];
    employees.forEach(emp => {
      positions.forEach(pos => {
        const cell = ws[XLSX.utils.encode_cell({ r: emp.row, c: pos.col })];
        if (cell && cell.v !== undefined) {
          const level = Math.min(4, Math.max(0, Math.round(Number(cell.v))));
          if (!isNaN(level) && level > 0) skills.push({ empName: emp.name, posName: pos.name, level });
        }
      });
    });

    return { positions, employees, skills };
  }

  function writeExport(workbook, mapping, exportData) {
    const { sheet, headerRow, rosterCol, firstPositionCol, firstRosterRow } = mapping;
    const ws = workbook.Sheets[sheet];
    if (!ws) return workbook;

    const { employees, positions, skills } = exportData;
    const skillMap = {};
    skills.forEach(s => { skillMap[`${s.empId}_${s.posId}`] = s.level; });

    // Write position headers
    positions.forEach((pos, pi) => {
      const addr = XLSX.utils.encode_cell({ r: headerRow, c: firstPositionCol + pi });
      const existing = ws[addr];
      if (existing) { existing.v = pos.name; existing.w = pos.name; }
      else ws[addr] = { t: 's', v: pos.name };
    });

    // Write roster + skills
    employees.forEach((emp, ei) => {
      const rosterAddr = XLSX.utils.encode_cell({ r: firstRosterRow + ei, c: rosterCol });
      const existingRoster = ws[rosterAddr];
      if (existingRoster) { existingRoster.v = emp.name; existingRoster.w = emp.name; }
      else ws[rosterAddr] = { t: 's', v: emp.name };

      positions.forEach((pos, pi) => {
        const cellAddr = XLSX.utils.encode_cell({ r: firstRosterRow + ei, c: firstPositionCol + pi });
        const level = skillMap[`${emp.id}_${pos.id}`] || 0;
        const existing = ws[cellAddr];
        if (existing) { existing.v = level; existing.w = String(level); existing.t = 'n'; }
        else ws[cellAddr] = { t: 'n', v: level };
      });
    });

    // Update range
    const lastRow = firstRosterRow + employees.length - 1;
    const lastCol = firstPositionCol + positions.length - 1;
    ws['!ref'] = XLSX.utils.encode_range({ s: { r: 0, c: 0 }, e: { r: lastRow, c: lastCol } });

    return workbook;
  }

  function validateOnly(ws, mapping, options = {}) {
    const minPositions = options.minPositions || 5;
    const minRoster    = options.minRoster    || 5;
    const minRatio     = options.minRatio     || 0.70;
    return _validate(ws, mapping, minPositions, minRoster, minRatio);
  }

  return { detectMapping, extractData, writeExport, validateOnly };
})();

function t(key) {
  const lang = window._LANG || 'en';
  const dict = TRANSLATIONS[lang] || TRANSLATIONS.en;
  if (!(key in dict)) {
    console.warn(`[i18n] Missing key: "${key}" (lang: ${lang})`);
    return key;
  }
  return dict[key];
}

function applyTranslations(root = document) {
  root.querySelectorAll('[data-i18n]').forEach(el => {
    el.textContent = t(el.dataset.i18n);
  });
  root.querySelectorAll('[data-i18n-ph]').forEach(el => {
    el.placeholder = t(el.dataset.i18nPh);
  });
  root.querySelectorAll('[data-i18n-title]').forEach(el => {
    el.title = t(el.dataset.i18nTitle);
  });
}

/**
 * AppState — Single mutable in-memory state. Services update it after DB writes.
 */
const AppState = (() => {
  const state = {
    lines: [],
    employees: [],      // active line's employees
    positions: [],      // active line's positions
    users: [],
    skillRecords: [],   // active line's skill records
    skillMap: new Map(),         // "empId_posId" -> SkillRecord
    qualifiedSet: new Set(),     // "empId_posId" where L3+ approved
    l2Set: new Set(),            // "empId_posId" where level===2
    todayAttendance: null,       // Map<empId, AttendanceRecord>
    templateMapping: null,
    currentRotation: null,
    recentLogs: [],
    currentLineId: null,
    settings: { language: 'en', maxRotationPlansPerLine: 30 }
  };

  function _buildMaps() {
    state.skillMap.clear();
    state.qualifiedSet.clear();
    state.l2Set.clear();
    state.skillRecords.forEach(r => {
      const key = `${r.employeeId}_${r.positionId}`;
      state.skillMap.set(key, r);
      if (r.status === 'approved' && r.currentLevel >= 3) state.qualifiedSet.add(key);
      if (r.currentLevel === 2) state.l2Set.add(key);
    });
  }

  function setLineData({ employees, positions, skillRecords, lineId }) {
    state.employees = employees.filter(e => e.active !== false);
    state.positions = positions.sort((a, b) => (a.sortOrder || 0) - (b.sortOrder || 0));
    state.skillRecords = skillRecords;
    state.currentLineId = lineId;
    state.todayAttendance = null;
    state.currentRotation = null;
    _buildMaps();
  }

  function setLines(lines) { state.lines = lines; }
  function setUsers(users) { state.users = users; }

  function updateSkillRecord(record) {
    const idx = state.skillRecords.findIndex(r => r.id === record.id);
    if (idx >= 0) state.skillRecords[idx] = record;
    else state.skillRecords.push(record);
    _buildMaps();
  }

  function setAttendance(map) { state.todayAttendance = map; }
  function setTemplateMapping(m) { state.templateMapping = m; }
  function setCurrentRotation(plan) { state.currentRotation = plan; }
  function setRecentLogs(logs) { state.recentLogs = logs; }

  function getSkillRecord(empId, posId) {
    return state.skillMap.get(`${empId}_${posId}`) || null;
  }

  function getPresentEmployees(date) {
    const att = state.todayAttendance;
    return state.employees.filter(emp => {
      if (!att) return true;
      const rec = att.get(emp.id);
      if (!rec) return true; // default present
      return rec.status === 'present' || rec.status === 'partial';
    });
  }

  return {
    get(key) { return state[key]; },
    setLineData, setLines, setUsers, updateSkillRecord,
    setAttendance, setTemplateMapping, setCurrentRotation, setRecentLogs,
    getSkillRecord, getPresentEmployees,
    get employees() { return state.employees; },
    get positions()  { return state.positions;  },
    get skillRecords() { return state.skillRecords; },
    get skillMap()   { return state.skillMap;   },
    get qualifiedSet() { return state.qualifiedSet; },
    get l2Set()      { return state.l2Set;      },
    get users()      { return state.users;      },
    get lines()      { return state.lines;      },
    get currentLineId() { return state.currentLineId; },
    get todayAttendance() { return state.todayAttendance; },
    get templateMapping() { return state.templateMapping; },
    get currentRotation() { return state.currentRotation; },
    get recentLogs()  { return state.recentLogs;  },
    get settings()   { return state.settings;   },
  };
})();

/**
 * Session — sessionStorage wrapper
 */
const Session = (() => {
  const KEY_USER = 'sm_userId';
  const KEY_ROLE = 'sm_userRole';
  const KEY_NAME = 'sm_userName';

  function set(userId, role, name) {
    sessionStorage.setItem(KEY_USER, String(userId));
    sessionStorage.setItem(KEY_ROLE, role);
    sessionStorage.setItem(KEY_NAME, name);
  }
  function clear() {
    sessionStorage.removeItem(KEY_USER);
    sessionStorage.removeItem(KEY_ROLE);
    sessionStorage.removeItem(KEY_NAME);
  }
  function get() {
    const id = sessionStorage.getItem(KEY_USER);
    if (!id) return null;
    return { id: parseInt(id), role: sessionStorage.getItem(KEY_ROLE), name: sessionStorage.getItem(KEY_NAME) };
  }
  function isSupervisor() { const s = get(); return s && s.role === 'supervisor'; }
  function isLoggedIn() { return !!get(); }

  return { set, clear, get, isSupervisor, isLoggedIn };
})();

/**
 * Toast — Notification system
 */
const Toast = (() => {
  let container;

  function _ensure() {
    if (!container) {
      container = document.getElementById('toast-container');
      if (!container) {
        container = document.createElement('div');
        container.id = 'toast-container';
        document.body.appendChild(container);
      }
    }
  }

  function show(msg, type = 'info', duration = 4000) {
    _ensure();
    const toast = document.createElement('div');
    toast.className = `toast ${type}`;
    toast.innerHTML = `<span class="toast-msg">${msg}</span>`;
    toast.onclick = () => _remove(toast);
    container.appendChild(toast);

    // Limit to 3 visible
    const all = container.querySelectorAll('.toast:not(.removing)');
    if (all.length > 3) _remove(all[0]);

    setTimeout(() => _remove(toast), duration);
    return toast;
  }

  function _remove(el) {
    if (!el || el.classList.contains('removing')) return;
    el.classList.add('removing');
    setTimeout(() => el.remove(), 250);
  }

  return { show, success: m => show(m, 'success', 3500), error: m => show(m, 'error', 6000), warn: m => show(m, 'warning', 4500) };
})();

/**
 * Modal — Single modal manager
 */
const Modal = (() => {
  let overlay = null;

  function open({ title, body, footer, maxWidth = '560px', onClose } = {}) {
    close();
    overlay = document.createElement('div');
    overlay.className = 'modal-overlay';
    overlay.innerHTML = `
      <div class="modal" style="max-width:${maxWidth}">
        <div class="modal-header">
          <span class="modal-title">${title || ''}</span>
          <button class="modal-close" aria-label="Close">✕</button>
        </div>
        <div class="modal-body">${body || ''}</div>
        ${footer ? `<div class="modal-footer">${footer}</div>` : ''}
      </div>`;

    overlay.querySelector('.modal-close').onclick = close;
    overlay.onclick = e => { if (e.target === overlay) close(); };

    document.addEventListener('keydown', _escHandler);
    document.body.appendChild(overlay);
    overlay._onClose = onClose;
    return overlay.querySelector('.modal');
  }

  function close() {
    if (overlay) {
      document.removeEventListener('keydown', _escHandler);
      if (overlay._onClose) overlay._onClose();
      overlay.remove();
      overlay = null;
    }
  }

  function _escHandler(e) { if (e.key === 'Escape') close(); }

  function getBody() { return overlay?.querySelector('.modal-body'); }
  function getModal() { return overlay?.querySelector('.modal'); }

  return { open, close, getBody, getModal };
})();

/**
 * Confirm dialog
 */
function confirmDialog(message) {
  return new Promise(resolve => {
    const modal = Modal.open({
      title: t('confirm'),
      body: `<p style="color:var(--text-2);margin-bottom:var(--sp-4)">${message}</p>`,
      footer: `<button class="btn btn-secondary" id="conf-no">${t('cancel')}</button>
               <button class="btn btn-danger" id="conf-yes">${t('yes')}</button>`
    });
    modal.closest('.modal').querySelector('#conf-yes').onclick = () => { Modal.close(); resolve(true); };
    modal.closest('.modal').querySelector('#conf-no').onclick  = () => { Modal.close(); resolve(false); };
  });
}
